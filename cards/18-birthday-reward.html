<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Reward</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .banner { max-width: 360px; width: 100%; background: #FFF3ED; border: 1px solid #FFE0D0; border-radius: 16px; padding: 14px; text-align: center; }
        .banner-text { font-size: 12px; font-weight: 600; color: #FF6B35; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .banner-text i { font-size: 16px; }
    </style>
</head>
<body>
    <!-- MODULE: drawBirthdayBanner -->
    <div class="banner">
        <div class="banner-text">
            <i class="ri-gift-fill"></i>
            Happy Birthday! Free treat unlocked
        </div>
    </div>
</body>
</html>
