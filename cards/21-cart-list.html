<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart List</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-family, 'Plus Jakarta Sans', sans-serif); background: var(--page-bg, #f5f5f5); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .tabs { display: flex; gap: 6px; margin-bottom: 16px; justify-content: center; max-width: 360px; width: 100%; }
        .tab { padding: 8px 14px; border-radius: var(--btn-radius, 10px); font-size: 11px; font-weight: 700; cursor: pointer; border: 1.5px solid var(--border-color, #ddd); background: var(--card-bg, #fff); color: var(--text-secondary, #666); transition: all 0.2s; }
        .tab.active { background: var(--accent, #00615F); color: #fff; border-color: var(--accent, #00615F); }
        .variant { display: none; max-width: 360px; width: 100%; }
        .variant.active { display: block; }
        .section-title { font-size: 16px; font-weight: 700; color: #1a1a1a; margin-bottom: 14px; }

        .qty { display: flex; align-items: center; gap: 8px; }
        .qty-btn { width: 24px; height: 24px; border-radius: 8px; border: 1.5px solid #00615F; background: #fff; color: #00615F; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .qty-num { font-size: 13px; font-weight: 700; color: #1a1a1a; min-width: 16px; text-align: center; }

        /* V1: Image Top */
        .v1-list { display: flex; flex-direction: column; gap: 10px; }
        .v1-item { display: flex; align-items: center; gap: 12px; background: var(--card-bg, #fff); padding: 12px; border-radius: var(--card-radius, 14px); box-shadow: var(--card-shadow, 0 2px 8px rgba(0,0,0,0.04)); }
        .v1-item img { width: 56px; height: 56px; border-radius: 12px; object-fit: cover; flex-shrink: 0; }
        .v1-item .item-info { flex: 1; }
        .v1-item .item-name { font-size: 13px; font-weight: 700; color: #1a1a1a; }
        .v1-item .item-desc { font-size: 10px; color: #888; margin-top: 2px; }
        .v1-item .item-price { font-size: 13px; font-weight: 700; color: #00615F; margin-top: 4px; }
        .v1-item .item-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
        .v1-item .item-remove { font-size: 14px; color: #ccc; cursor: pointer; }

        /* V2: Image Left */
        .v2-list { display: flex; flex-direction: column; gap: 8px; }
        .v2-item { display: flex; align-items: center; gap: 12px; background: var(--card-bg, #fff); padding: 10px 12px; border-radius: var(--card-radius, 14px); box-shadow: var(--card-shadow, 0 2px 8px rgba(0,0,0,0.04)); }
        .v2-item img { width: 48px; height: 48px; border-radius: 10px; object-fit: cover; flex-shrink: 0; }
        .v2-item .item-info { flex: 1; display: flex; align-items: center; justify-content: space-between; }
        .v2-item .item-left { display: flex; flex-direction: column; }
        .v2-item .item-name { font-size: 12px; font-weight: 700; color: #1a1a1a; }
        .v2-item .item-desc { font-size: 10px; color: #888; }
        .v2-item .item-right { display: flex; align-items: center; gap: 10px; }
        .v2-item .item-price { font-size: 12px; font-weight: 700; color: #00615F; }

        /* V3: Minimal */
        .v3-list { display: flex; flex-direction: column; gap: 6px; }
        .v3-item { display: flex; align-items: center; gap: 10px; background: var(--card-bg, #fff); padding: 10px 14px; border-radius: var(--card-radius, 12px); box-shadow: var(--card-shadow, 0 1px 4px rgba(0,0,0,0.03)); }
        .v3-item .item-icon { width: 36px; height: 36px; background: #F0F7F6; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #00615F; flex-shrink: 0; }
        .v3-item .item-info { flex: 1; display: flex; align-items: center; justify-content: space-between; }
        .v3-item .item-name { font-size: 12px; font-weight: 700; color: #1a1a1a; }
        .v3-item .item-price { font-size: 12px; font-weight: 700; color: #00615F; }
        .v3-item .item-remove { font-size: 12px; color: #ccc; cursor: pointer; margin-left: 6px; }
    </style>
</head>
<body>
    <div style="display:flex;flex-direction:column;align-items:center;width:100%;">
        <div class="tabs">
            <div class="tab active" onclick="switchTab(0)">Image Top</div>
            <div class="tab" onclick="switchTab(1)">Image Left</div>
            <div class="tab" onclick="switchTab(2)">Minimal</div>
        </div>

        <!-- V1: Image Top -->
        <div class="variant active" id="v1">
            <div class="section-title">Your Cart</div>
            <div class="v1-list">
                <div class="v1-item">
                    <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=120&q=80" alt="food">
                    <div class="item-info">
                        <div class="item-name">Cappuccino</div>
                        <div class="item-desc">Large, Oat Milk</div>
                        <div class="item-price">$5.49</div>
                    </div>
                    <div class="item-actions">
                        <i class="ri-delete-bin-line item-remove"></i>
                        <div class="qty"><button class="qty-btn">-</button><span class="qty-num">1</span><button class="qty-btn">+</button></div>
                    </div>
                </div>
                <div class="v1-item">
                    <img src="https://images.unsplash.com/photo-1551024506-0bccd828d307?auto=format&fit=crop&w=120&q=80" alt="food">
                    <div class="item-info">
                        <div class="item-name">Chocolate Croissant</div>
                        <div class="item-desc">Warm, Fresh</div>
                        <div class="item-price">$3.99</div>
                    </div>
                    <div class="item-actions">
                        <i class="ri-delete-bin-line item-remove"></i>
                        <div class="qty"><button class="qty-btn">-</button><span class="qty-num">2</span><button class="qty-btn">+</button></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- V2: Image Left -->
        <div class="variant" id="v2">
            <div class="section-title">Your Cart</div>
            <div class="v2-list">
                <div class="v2-item">
                    <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=100&q=80" alt="food">
                    <div class="item-info">
                        <div class="item-left">
                            <div class="item-name">Cappuccino</div>
                            <div class="item-desc">Large, Oat Milk</div>
                        </div>
                        <div class="item-right">
                            <div class="item-price">$5.49</div>
                            <div class="qty"><button class="qty-btn">-</button><span class="qty-num">1</span><button class="qty-btn">+</button></div>
                        </div>
                    </div>
                </div>
                <div class="v2-item">
                    <img src="https://images.unsplash.com/photo-1551024506-0bccd828d307?auto=format&fit=crop&w=100&q=80" alt="food">
                    <div class="item-info">
                        <div class="item-left">
                            <div class="item-name">Chocolate Croissant</div>
                            <div class="item-desc">Warm, Fresh</div>
                        </div>
                        <div class="item-right">
                            <div class="item-price">$3.99</div>
                            <div class="qty"><button class="qty-btn">-</button><span class="qty-num">2</span><button class="qty-btn">+</button></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- V3: Minimal -->
        <div class="variant" id="v3">
            <div class="section-title">Your Cart</div>
            <div class="v3-list">
                <div class="v3-item">
                    <div class="item-icon"><i class="ri-cup-line"></i></div>
                    <div class="item-info">
                        <div class="item-name">Cappuccino x1</div>
                        <div class="item-price">$5.49</div>
                    </div>
                    <div class="qty"><button class="qty-btn">-</button><span class="qty-num">1</span><button class="qty-btn">+</button></div>
                    <i class="ri-close-line item-remove"></i>
                </div>
                <div class="v3-item">
                    <div class="item-icon"><i class="ri-cake-2-line"></i></div>
                    <div class="item-info">
                        <div class="item-name">Chocolate Croissant x2</div>
                        <div class="item-price">$7.98</div>
                    </div>
                    <div class="qty"><button class="qty-btn">-</button><span class="qty-num">2</span><button class="qty-btn">+</button></div>
                    <i class="ri-close-line item-remove"></i>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(idx) {
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
            document.querySelectorAll('.variant').forEach((v, i) => v.classList.toggle('active', i === idx));
        }
    </script>
</body>
</html>
