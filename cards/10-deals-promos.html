<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deals Promos</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .tabs { display: flex; gap: 6px; margin-bottom: 16px; justify-content: center; max-width: 360px; width: 100%; }
        .tab { padding: 8px 14px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; border: 1.5px solid #ddd; background: #fff; color: #666; transition: all 0.2s; }
        .tab.active { background: #00615F; color: #fff; border-color: #00615F; }
        .variant { display: none; max-width: 360px; width: 100%; }
        .variant.active { display: block; }

        .phone-frame { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.1); border: 3px solid #1a1a1a; }
        .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 6px 16px; background: #fff; }
        .status-bar .notch { width: 100px; height: 24px; background: #1a1a1a; border-radius: 0 0 16px 16px; }
        .status-bar .status-icons { display: flex; gap: 6px; align-items: center; font-size: 11px; font-weight: 600; color: #1a1a1a; }
        .status-bar .time { font-size: 11px; font-weight: 700; color: #1a1a1a; }
    </style>
</head>
<body>
    <div style="display:flex;flex-direction:column;align-items:center;width:100%;">
        <div class="tabs">
            <div class="tab active" onclick="switchTab(0)">Default</div>
            <div class="tab" onclick="switchTab(1)">Option 1</div>
            <div class="tab" onclick="switchTab(2)">Option 2</div>
        </div>

        <!-- V1: Default -->
        <div class="variant active" id="v1">
            <div class="phone-frame">
                <div class="status-bar">
                    <span class="time">19:02</span>
                    <div class="notch"></div>
                    <div class="status-icons">
                        <i class="ri-signal-wifi-fill"></i>
                        <i class="ri-battery-fill"></i>
                    </div>
                </div>
                <div style="padding:0 16px 16px;">
                    <div style="background:linear-gradient(135deg,#00615F,#A0845C);border-radius:20px;padding:24px;color:#fff;display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden;min-height:140px;box-shadow:0 4px 16px rgba(61,50,41,0.1);">
                        <div style="z-index:1;max-width:55%;">
                            <div style="font-size:16px;font-weight:700;margin-bottom:8px;">Food Package Offer</div>
                            <div style="font-size:48px;font-weight:900;line-height:1;">25%</div>
                            <div style="font-size:18px;font-weight:700;letter-spacing:2px;">DISCOUNT</div>
                        </div>
                        <div style="position:absolute;right:16px;top:50%;transform:translateY(-50%);width:140px;height:120px;">
                            <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=300&q=80" style="width:100%;height:100%;object-fit:cover;border-radius:14px;" alt="food">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- V2: Option 1 -->
        <div class="variant" id="v2">
            <div class="phone-frame">
                <div class="status-bar">
                    <span class="time">19:02</span>
                    <div class="notch"></div>
                    <div class="status-icons">
                        <i class="ri-signal-wifi-fill"></i>
                        <i class="ri-battery-fill"></i>
                    </div>
                </div>
                <div style="padding:0 16px 16px;">
                    <div style="background:#fff;border-radius:16px;padding:16px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 12px rgba(0,0,0,0.06);">
                        <div style="flex:1;">
                            <div style="font-size:10px;color:#00615F;font-weight:700;letter-spacing:1px;">SPECIAL OFFER</div>
                            <div style="font-size:28px;font-weight:900;color:#1a1a1a;line-height:1;">25%</div>
                            <div style="font-size:12px;font-weight:700;color:#888;">DISCOUNT</div>
                            <div style="font-size:10px;color:#888;margin-top:4px;">On all food packages</div>
                        </div>
                        <div style="width:80px;height:80px;border-radius:50%;overflow:hidden;flex-shrink:0;">
                            <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=200&q=80" style="width:100%;height:100%;object-fit:cover;" alt="food">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- V3: Option 2 -->
        <div class="variant" id="v3">
            <div class="phone-frame">
                <div class="status-bar">
                    <span class="time">19:02</span>
                    <div class="notch"></div>
                    <div class="status-icons">
                        <i class="ri-signal-wifi-fill"></i>
                        <i class="ri-battery-fill"></i>
                    </div>
                </div>
                <div style="padding:0 16px 16px;">
                    <div style="background:#fff;border-radius:14px;border-left:4px solid #00615F;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,0.06);">
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <div>
                                <div style="font-size:14px;font-weight:700;color:#1a1a1a;">Food Package Offer</div>
                                <div style="font-size:10px;color:#888;margin-top:2px;">Limited time deal</div>
                            </div>
                            <div style="text-align:right;">
                                <div style="font-size:24px;font-weight:900;color:#00615F;">25%</div>
                                <div style="font-size:9px;color:#888;">OFF</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(idx) {
            document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===idx));
            document.querySelectorAll('.variant').forEach((v,i) => v.classList.toggle('active', i===idx));
        }
    </script>
</body>
</html>
