<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limited Time Deal Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: #fff; border-radius: 24px; overflow: hidden; max-width: 280px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
        .card-img-wrap { position: relative; }
        .card-img { width: 100%; height: 240px; object-fit: cover; display: block; }
        .card-heart { position: absolute; top: 12px; right: 12px; width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.92); display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.12); cursor: pointer; }
        .card-heart i { color: #ccc; font-size: 16px; }
        .card-countdown { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.7)); padding: 28px 14px 12px; text-align: center; }
        .countdown-pill { background: rgba(255,255,255,0.92); color: #333; font-size: 12px; font-weight: 700; padding: 6px 16px; border-radius: 20px; display: inline-block; }
        .card-body { padding: 16px; display: flex; align-items: center; justify-content: space-between; }
        .card-title { font-size: 16px; font-weight: 700; color: #1a1a1a; }
        .card-price { font-size: 18px; font-weight: 800; color: #1a1a1a; }
    </style>
</head>
<body>
    <!-- MODULE: drawLimitedTimeDeal -->
    <!-- IMAGE: photo-1551024506 (chocolate cake slice) -->
    <div class="card">
        <div class="card-img-wrap">
            <img src="https://images.unsplash.com/photo-1551024506-0bccd828d307?auto=format&fit=crop&w=400&q=80" class="card-img" alt="chocolate cake">
            <div class="card-heart"><i class="ri-add-line"></i></div>
            <div class="card-countdown">
                <div class="countdown-pill">Limited Offer 03:48:19</div>
            </div>
        </div>
        <div class="card-body">
            <span class="card-title">Chocolate Dream</span>
            <span class="card-price">$5.50</span>
        </div>
    </div>
</body>
</html>
