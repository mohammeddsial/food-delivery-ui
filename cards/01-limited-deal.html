<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limited Time Deal Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f5f5; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .variant-tabs { display: flex; gap: 8px; margin-bottom: 24px; }
        .variant-tab { padding: 8px 16px; border-radius: 8px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-size: 12px; font-weight: 600; color: #666; transition: all 0.2s; }
        .variant-tab.active { background: #FF6B35; color: #fff; border-color: #FF6B35; }
        .variant-tab:hover:not(.active) { border-color: #FF6B35; }
        .variant { display: none; }
        .variant.active { display: block; }

        /* Variant 1: Image Top */
        .v1-card { background: #fff; border-radius: 24px; overflow: hidden; max-width: 280px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
        .v1-img-wrap { position: relative; }
        .v1-img { width: 100%; height: 240px; object-fit: cover; display: block; }
        .v1-heart { position: absolute; top: 12px; right: 12px; width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.92); display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
        .v1-heart i { color: #ccc; font-size: 16px; }
        .v1-countdown { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.7)); padding: 28px 14px 12px; text-align: center; }
        .countdown-pill { background: rgba(255,255,255,0.92); color: #333; font-size: 12px; font-weight: 700; padding: 6px 16px; border-radius: 20px; display: inline-block; }
        .v1-body { padding: 16px; display: flex; align-items: center; justify-content: space-between; }
        .v1-title { font-size: 16px; font-weight: 700; color: #1a1a1a; }
        .v1-price { font-size: 18px; font-weight: 800; color: #1a1a1a; }

        /* Variant 2: Image Left */
        .v2-card { background: #fff; border-radius: 20px; overflow: hidden; max-width: 340px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.08); display: flex; height: 140px; }
        .v2-img-wrap { position: relative; width: 140px; flex-shrink: 0; }
        .v2-img { width: 100%; height: 100%; object-fit: cover; }
        .v2-countdown { position: absolute; bottom: 8px; left: 8px; }
        .v2-body { padding: 16px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .v2-title { font-size: 15px; font-weight: 700; color: #1a1a1a; }
        .v2-desc { font-size: 12px; color: #888; margin-top: 4px; }
        .v2-footer { display: flex; align-items: center; justify-content: space-between; }
        .v2-price { font-size: 18px; font-weight: 800; color: #FF6B35; }
        .v2-btn { width: 32px; height: 32px; border-radius: 50%; background: #FF6B35; border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* Variant 3: Minimal */
        .v3-card { background: #fff; border-radius: 16px; padding: 20px; max-width: 280px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center; }
        .v3-icon { width: 64px; height: 64px; border-radius: 50%; background: #FFF3E0; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
        .v3-icon i { font-size: 28px; color: #FF6B35; }
        .v3-title { font-size: 16px; font-weight: 700; color: #1a1a1a; }
        .v3-desc { font-size: 12px; color: #888; margin-top: 6px; }
        .v3-timer { margin-top: 16px; display: inline-flex; align-items: center; gap: 6px; background: #FFF3E0; padding: 8px 16px; border-radius: 20px; }
        .v3-timer i { color: #FF6B35; font-size: 14px; }
        .v3-timer span { font-size: 13px; font-weight: 700; color: #FF6B35; }
        .v3-price-row { margin-top: 16px; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .v3-price { font-size: 20px; font-weight: 800; color: #1a1a1a; }
        .v3-add { padding: 10px 24px; border-radius: 12px; background: #FF6B35; color: #fff; border: none; font-weight: 700; font-size: 13px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="variant-tabs">
        <div class="variant-tab active" onclick="showVariant(1)">Image Top</div>
        <div class="variant-tab" onclick="showVariant(2)">Image Left</div>
        <div class="variant-tab" onclick="showVariant(3)">Minimal</div>
    </div>

    <!-- Variant 1: Image Top -->
    <div class="variant v1 active" id="v1">
        <div class="v1-card">
            <div class="v1-img-wrap">
                <img src="https://images.unsplash.com/photo-1551024506-0bccd828d307?auto=format&fit=crop&w=400&q=80" class="v1-img" alt="chocolate cake">
                <div class="v1-heart"><i class="ri-heart-line"></i></div>
                <div class="v1-countdown">
                    <div class="countdown-pill">Limited Offer 03:48:19</div>
                </div>
            </div>
            <div class="v1-body">
                <span class="v1-title">Chocolate Dream</span>
                <span class="v1-price">$5.50</span>
            </div>
        </div>
    </div>

    <!-- Variant 2: Image Left -->
    <div class="variant" id="v2">
        <div class="v2-card">
            <div class="v2-img-wrap">
                <img src="https://images.unsplash.com/photo-1551024506-0bccd828d307?auto=format&fit=crop&w=400&q=80" class="v2-img" alt="chocolate cake">
                <div class="v2-countdown">
                    <div class="countdown-pill" style="font-size:10px;padding:4px 10px;">03:48:19</div>
                </div>
            </div>
            <div class="v2-body">
                <div>
                    <div class="v2-title">Chocolate Dream</div>
                    <div class="v2-desc">Rich chocolate layer cake</div>
                </div>
                <div class="v2-footer">
                    <span class="v2-price">$5.50</span>
                    <button class="v2-btn"><i class="ri-add-line"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Variant 3: Minimal -->
    <div class="variant" id="v3">
        <div class="v3-card">
            <div class="v3-icon"><i class="ri-cake-3-line"></i></div>
            <div class="v3-title">Chocolate Dream</div>
            <div class="v3-desc">Rich chocolate layer cake with ganache</div>
            <div class="v3-timer">
                <i class="ri-time-line"></i>
                <span>03:48:19</span>
            </div>
            <div class="v3-price-row">
                <span class="v3-price">$5.50</span>
                <button class="v3-add">Add to Cart</button>
            </div>
        </div>
    </div>

    <script>
    function showVariant(n) {
        document.querySelectorAll('.variant').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.variant-tab').forEach(t => t.classList.remove('active'));
        document.getElementById('v' + n).classList.add('active');
        document.querySelectorAll('.variant-tab')[n - 1].classList.add('active');
    }
    </script>
</body>
</html>
