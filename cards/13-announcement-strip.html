<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Announcement Strip</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .strip { max-width: 360px; width: 100%; background: #1a1a1a; padding: 12px 20px; text-align: center; font-size: 12px; font-weight: 700; color: #FFD700; display: flex; align-items: center; justify-content: center; gap: 8px; letter-spacing: 0.5px; border-radius: 14px; }
        .strip i { font-size: 14px; }
    </style>
</head>
<body>
    <!-- MODULE: drawAnnouncementStrip -->
    <div class="strip">
        <i class="ri-flashlight-line"></i>
        FREE DELIVERY ON ORDERS OVER $25
    </div>
</body>
</html>
