<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart List Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .list { max-width: 360px; width: 100%; display: flex; flex-direction: column; gap: 10px; }
        .item { background: #fff; border-radius: 18px; padding: 12px; display: flex; align-items: center; gap: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .item-img { width: 64px; height: 64px; border-radius: 14px; object-fit: cover; flex-shrink: 0; }
        .item-info { flex: 1; }
        .item-name { font-size: 14px; font-weight: 700; color: #1a1a1a; }
        .item-desc { font-size: 11px; color: #999; margin-top: 2px; }
        .item-price { font-size: 14px; font-weight: 700; color: #1a1a1a; margin-top: 4px; }
        .qty-stepper { display: flex; align-items: center; background: #FF6B35; border-radius: 24px; overflow: hidden; flex-shrink: 0; }
        .qty-btn { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; border: none; background: transparent; }
        .qty-num { width: 24px; text-align: center; color: #fff; font-size: 14px; font-weight: 800; }
    </style>
</head>
<body>
    <!-- MODULE: Cart list with quantity steppers (Image 6 reference) -->
    <!-- IMAGES: photo-1509042239860 (orange juice), photo-1551024506 (cheesecake), photo-1506084868230 (stir-fried) -->
    <div class="list">
        <div class="item">
            <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=80&q=80" class="item-img" alt="juice">
            <div class="item-info">
                <div class="item-name">Fresh Orange Juice</div>
                <div class="item-desc">Fresh orange juice</div>
                <div class="item-price">$05.99</div>
            </div>
            <div class="qty-stepper">
                <button class="qty-btn">-</button>
                <span class="qty-num">2</span>
                <button class="qty-btn">+</button>
            </div>
        </div>
        <div class="item">
            <img src="https://images.unsplash.com/photo-1551024506-0bccd828d307?auto=format&fit=crop&w=80&q=80" class="item-img" alt="cheesecake">
            <div class="item-info">
                <div class="item-name">Cheesecake With Blueberry</div>
                <div class="item-desc">Fresh orange juice</div>
                <div class="item-price">$07.99</div>
            </div>
            <div class="qty-stepper">
                <button class="qty-btn">-</button>
                <span class="qty-num">4</span>
                <button class="qty-btn">+</button>
            </div>
        </div>
        <div class="item">
            <img src="https://images.unsplash.com/photo-1506084868230-bb9d95c24759?auto=format&fit=crop&w=80&q=80" class="item-img" alt="stir-fried">
            <div class="item-info">
                <div class="item-name">Stir-Fried Spicy and Herb</div>
                <div class="item-desc">Fresh orange juice</div>
                <div class="item-price">$09.00</div>
            </div>
            <div class="qty-stepper">
                <button class="qty-btn">-</button>
                <span class="qty-num">3</span>
                <button class="qty-btn">+</button>
            </div>
        </div>
    </div>
</body>
</html>
