<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finish Your Order</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .tabs { display: flex; gap: 6px; margin-bottom: 16px; justify-content: center; max-width: 360px; width: 100%; }
        .tab { padding: 8px 14px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; border: 1.5px solid #ddd; background: #fff; color: #666; transition: all 0.2s; }
        .tab.active { background: #00615F; color: #fff; border-color: #00615F; }
        .variant { display: none; max-width: 360px; width: 100%; }
        .variant.active { display: block; }

        .phone-frame { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.1); border: 3px solid #1a1a1a; }
        .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 6px 16px; background: #fff; }
        .status-bar .notch { width: 100px; height: 24px; background: #1a1a1a; border-radius: 0 0 16px 16px; }
        .status-bar .status-icons { display: flex; gap: 6px; align-items: center; font-size: 11px; font-weight: 600; color: #1a1a1a; }
        .status-bar .time { font-size: 11px; font-weight: 700; color: #1a1a1a; }
    </style>
</head>
<body>
    <div style="display:flex;flex-direction:column;align-items:center;width:100%;">
        <div class="tabs">
            <div class="tab active" onclick="switchTab(0)">Default</div>
            <div class="tab" onclick="switchTab(1)">Option 1</div>
            <div class="tab" onclick="switchTab(2)">Option 2</div>
        </div>

        <!-- V1: Default -->
        <div class="variant active" id="v1">
            <div class="phone-frame">
                <div class="status-bar">
                    <span class="time">19:02</span>
                    <div class="notch"></div>
                    <div class="status-icons">
                        <i class="ri-signal-wifi-fill"></i>
                        <i class="ri-battery-fill"></i>
                    </div>
                </div>
                <div style="padding:0 16px 16px;">
                    <div style="padding:14px;background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,0.06);display:flex;align-items:center;justify-content:space-between;">
                        <div style="display:flex;align-items:center;gap:12px;">
                            <div style="width:42px;height:42px;border-radius:12px;background:#F0F7F6;display:flex;align-items:center;justify-content:center;"><i class="ri-shopping-cart-2-fill" style="font-size:18px;color:#1a1a1a;"></i></div>
                            <div>
                                <div style="font-size:12px;font-weight:700;color:#1a1a1a;">Cart Waiting</div>
                                <div style="font-size:10px;color:#888;">2 items in your cart</div>
                            </div>
                        </div>
                        <button style="background:#1A1A1A;color:#fff;font-size:10px;font-weight:700;padding:8px 16px;border-radius:9999px;border:none;cursor:pointer;display:flex;align-items:center;gap:4px;">Checkout <i class="ri-arrow-right-line" style="font-size:12px;"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- V2: Option 1 -->
        <div class="variant" id="v2">
            <div class="phone-frame">
                <div class="status-bar">
                    <span class="time">19:02</span>
                    <div class="notch"></div>
                    <div class="status-icons">
                        <i class="ri-signal-wifi-fill"></i>
                        <i class="ri-battery-fill"></i>
                    </div>
                </div>
                <div style="padding:0 16px 16px;">
                    <div style="background:#fff;border-radius:16px;padding:14px;box-shadow:0 2px 12px rgba(0,0,0,0.06);">
                        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
                            <div style="width:36px;height:36px;border-radius:10px;background:#F0F7F6;display:flex;align-items:center;justify-content:center;"><i class="ri-shopping-cart-2-fill" style="font-size:16px;color:#1a1a1a;"></i></div>
                            <div style="flex:1;">
                                <div style="font-size:12px;font-weight:700;color:#1a1a1a;">Cart Waiting</div>
                                <div style="font-size:10px;color:#888;">2 items</div>
                            </div>
                            <span style="font-size:14px;font-weight:800;color:#1a1a1a;">$12.48</span>
                        </div>
                        <div style="display:flex;gap:8px;margin-bottom:10px;">
                            <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=80&q=80" style="width:40px;height:40px;border-radius:8px;object-fit:cover;" alt="item1">
                            <img src="https://images.unsplash.com/photo-1551024506-0bccd828d307?auto=format&fit=crop&w=80&q=80" style="width:40px;height:40px;border-radius:8px;object-fit:cover;" alt="item2">
                        </div>
                        <button style="width:100%;background:#00615F;color:#fff;font-size:11px;font-weight:700;padding:10px;border-radius:10px;border:none;cursor:pointer;">Checkout <i class="ri-arrow-right-line" style="font-size:12px;"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- V3: Option 2 -->
        <div class="variant" id="v3">
            <div class="phone-frame">
                <div class="status-bar">
                    <span class="time">19:02</span>
                    <div class="notch"></div>
                    <div class="status-icons">
                        <i class="ri-signal-wifi-fill"></i>
                        <i class="ri-battery-fill"></i>
                    </div>
                </div>
                <div style="padding:0 16px 16px;">
                    <div style="background:#fff;border-radius:14px;border:1px solid #eee;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.06);">
                        <div style="padding:12px 14px;display:flex;align-items:center;justify-content:space-between;background:#F0F7F6;">
                            <div style="display:flex;align-items:center;gap:8px;">
                                <i class="ri-time-line" style="font-size:14px;color:#1a1a1a;"></i>
                                <span style="font-size:11px;font-weight:700;color:#1a1a1a;">Cart expires in 14:32</span>
                            </div>
                            <span style="font-size:12px;font-weight:800;color:#00615F;">$12.48</span>
                        </div>
                        <div style="padding:10px 14px;">
                            <div style="display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:4px;"><span>Craft Latte</span><span style="color:#1a1a1a;">$5.99</span></div>
                            <div style="display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:8px;"><span>Croissant</span><span style="color:#1a1a1a;">$6.49</span></div>
                            <div style="border-top:1px solid #eee;padding-top:8px;display:flex;justify-content:space-between;">
                                <button style="background:none;border:none;font-size:10px;font-weight:600;color:#888;cursor:pointer;">View Cart</button>
                                <button style="background:#00615F;color:#fff;font-size:10px;font-weight:700;padding:6px 14px;border-radius:8px;border:none;cursor:pointer;">Checkout</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(idx) {
            document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===idx));
            document.querySelectorAll('.variant').forEach((v,i) => v.classList.toggle('active', i===idx));
        }
    </script>
</body>
</html>
