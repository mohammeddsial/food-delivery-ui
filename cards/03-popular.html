<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popular Foods Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .section { max-width: 360px; width: 100%; }
        .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
        .section-title { font-size: 16px; font-weight: 700; color: #1a1a1a; }
        .section-link { font-size: 12px; color: #FF6B35; font-weight: 600; cursor: pointer; }
        .rail { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 8px; }
        .rail::-webkit-scrollbar { display: none; }
        .card { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08); flex-shrink: 0; width: 160px; }
        .card-img-wrap { position: relative; }
        .card-img { width: 100%; height: 120px; object-fit: cover; display: block; }
        .card-heart { position: absolute; top: 8px; right: 8px; width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.92); display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.12); cursor: pointer; }
        .card-heart i { color: #ccc; font-size: 12px; }
        .card-price-badge { position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%); background: #FF6B35; color: #fff; font-size: 12px; font-weight: 800; padding: 5px 14px; border-radius: 12px; white-space: nowrap; box-shadow: 0 4px 12px rgba(255,107,53,0.35); z-index: 2; }
        .card-body { padding: 12px; padding-top: 18px; }
        .card-title { font-size: 13px; font-weight: 700; color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-meta { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
        .meta-item { display: flex; align-items: center; gap: 3px; font-size: 10px; color: #888; font-weight: 600; }
        .meta-item i { font-size: 12px; }
        .meta-item .star { color: #FFD700; }
        .meta-item .clock { color: #FF4444; }
    </style>
</head>
<body>
    <!-- MODULE: drawPopularRail -->
    <!-- IMAGES: photo-1578985545062 (chocolate cake), photo-1603532648955 (chocolate cake 2) -->
    <div class="section">
        <div class="section-header">
            <span class="section-title">Popular Foods</span>
            <span class="section-link">View All</span>
        </div>
        <div class="rail">
            <div class="card">
                <div class="card-img-wrap">
                    <img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?auto=format&fit=crop&w=150&q=80" class="card-img" alt="food">
                    <div class="card-heart"><i class="ri-heart-line"></i></div>
                    <div class="card-price-badge">$09.99</div>
                </div>
                <div class="card-body">
                    <div class="card-title">Stir-Fried Spicy</div>
                    <div class="card-meta">
                        <span class="meta-item"><i class="ri-star-fill star"></i> 4.9</span>
                        <span class="meta-item"><i class="ri-time-line clock"></i> 20-25 Min</span>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="card-img-wrap">
                    <img src="https://images.unsplash.com/photo-1603532648955-039310d9ed75?auto=format&fit=crop&w=150&q=80" class="card-img" alt="food">
                    <div class="card-heart"><i class="ri-heart-line"></i></div>
                    <div class="card-price-badge">$12.99</div>
                </div>
                <div class="card-body">
                    <div class="card-title">Noodles With Chicken</div>
                    <div class="card-meta">
                        <span class="meta-item"><i class="ri-star-fill star"></i> 4.9</span>
                        <span class="meta-item"><i class="ri-time-line clock"></i> 20-25 Min</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
