<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Side Drawer</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .phone { width: 375px; height: 600px; background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.12); position: relative; }
        .status-bar { height: 44px; background: #fff; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 24px 8px; position: relative; z-index: 60; }
        .notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 120px; height: 28px; background: #000; border-radius: 0 0 20px 20px; }
        .time { font-size: 15px; font-weight: 700; color: #1a1a1a; }
        .icons { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #666; }
        .icons i { font-size: 13px; }
        .nav-row { padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; position: relative; z-index: 60; background: #fff; }
        .nav-left { display: flex; align-items: center; gap: 10px; }
        .hamburger { width: 32px; height: 32px; border-radius: 10px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; }
        .hamburger i { font-size: 16px; color: #333; }
        .brand { font-size: 14px; font-weight: 800; color: #1a1a1a; }
        .cart-btn { width: 36px; height: 36px; border-radius: 12px; background: #FF6B35; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; border: none; }
        .cart-btn i { color: #fff; font-size: 18px; }
        .cart-badge { position: absolute; top: -4px; right: -4px; width: 16px; height: 16px; background: #1a1a1a; color: #fff; font-size: 9px; font-weight: 700; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #fff; }
        .content { height: 488px; display: flex; align-items: center; justify-content: center; color: #ccc; font-size: 13px; }

        /* Overlay */
        .drawer-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); z-index: 70; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .drawer-overlay.open { opacity: 1; pointer-events: auto; }

        /* Drawer */
        .drawer { position: absolute; top: 0; left: 0; width: 280px; height: 100%; background: #fff; z-index: 80; transform: translateX(-100%); transition: transform 0.3s ease; display: flex; flex-direction: column; box-shadow: 4px 0 20px rgba(0,0,0,0.1); }
        .drawer.open { transform: translateX(0); }
        .drawer-header { padding: 60px 20px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; }
        .drawer-brand { font-size: 16px; font-weight: 800; color: #1a1a1a; }
        .drawer-close { width: 32px; height: 32px; border-radius: 50%; background: #f5f5f5; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; }
        .drawer-close i { font-size: 16px; color: #333; }
        .drawer-nav { flex: 1; padding: 16px 0; }
        .drawer-nav a { display: flex; align-items: center; gap: 12px; padding: 14px 24px; font-size: 14px; font-weight: 600; color: #333; text-decoration: none; transition: background 0.2s; }
        .drawer-nav a:hover { background: #f5f5f5; }
        .drawer-nav a i { font-size: 20px; color: #FF6B35; width: 24px; text-align: center; }
        .drawer-footer { padding: 16px 24px; border-top: 1px solid #eee; }
        .drawer-footer-btn { width: 100%; padding: 12px; border-radius: 12px; background: #FF6B35; color: #fff; font-size: 13px; font-weight: 700; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
    </style>
</head>
<body>
    <!-- MODULE: Side Drawer -->
    <div class="phone">
        <div class="status-bar">
            <div class="notch"></div>
            <span class="time">19:02</span>
            <span class="icons"><i class="ri-signal-wifi-fill"></i><i class="ri-wifi-fill"></i><i class="ri-battery-2-fill"></i></span>
        </div>
        <div class="nav-row">
            <div class="nav-left">
                <button class="hamburger" id="openDrawer"><i class="ri-menu-2-fill"></i></button>
                <span class="brand">Food Hub</span>
            </div>
            <button class="cart-btn"><i class="ri-shopping-bag-3-fill"></i><span class="cart-badge">2</span></button>
        </div>
        <div class="content">Tap hamburger to open drawer</div>

        <div class="drawer-overlay" id="overlay"></div>
        <div class="drawer" id="drawer">
            <div class="drawer-header">
                <span class="drawer-brand">Food Hub</span>
                <button class="drawer-close" id="closeDrawer"><i class="ri-close-fill"></i></button>
            </div>
            <div class="drawer-nav">
                <a href="#"><i class="ri-home-5-fill"></i> Home</a>
                <a href="#"><i class="ri-search-line"></i> Search</a>
                <a href="#"><i class="ri-heart-3-line"></i> Favorites</a>
                <a href="#"><i class="ri-shopping-bag-3-line"></i> Orders</a>
                <a href="#"><i class="ri-user-3-line"></i> Profile</a>
                <a href="#"><i class="ri-settings-3-line"></i> Settings</a>
            </div>
            <div class="drawer-footer">
                <button class="drawer-footer-btn"><i class="ri-logout-box-r-line"></i> Log Out</button>
            </div>
        </div>
    </div>
    <script>
        const openBtn = document.getElementById('openDrawer');
        const closeBtn = document.getElementById('closeDrawer');
        const overlay = document.getElementById('overlay');
        const drawer = document.getElementById('drawer');

        function open() { overlay.classList.add('open'); drawer.classList.add('open'); }
        function close() { overlay.classList.remove('open'); drawer.classList.remove('open'); }

        openBtn.addEventListener('click', open);
        closeBtn.addEventListener('click', close);
        overlay.addEventListener('click', close);
    </script>
</body>
</html>
