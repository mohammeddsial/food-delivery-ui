<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stories</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .tabs { display: flex; gap: 6px; margin-bottom: 16px; justify-content: center; max-width: 360px; width: 100%; }
        .tab { padding: 8px 14px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; border: 1.5px solid #ddd; background: #fff; color: #666; transition: all 0.2s; }
        .tab.active { background: #00615F; color: #fff; border-color: #00615F; }
        .variant { display: none; max-width: 360px; width: 100%; }
        .variant.active { display: block; }
        :root { --card-bg: #ffffff; --card-radius: 16px; --card-shadow: 0 2px 12px rgba(0,0,0,0.06); --accent: #00615F; --accent-light: #F0F7F6; --text-primary: #1a1a1a; --text-secondary: #888; --btn-radius: 12px; --pill-bg: #F5EDE4; }

        .phone-mockup { width: 375px; background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.12); }
        .status-bar { height: 44px; background: #fff; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 24px 8px; position: relative; }
        .notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 120px; height: 28px; background: #000; border-radius: 0 0 20px 20px; }
        .time { font-size: 15px; font-weight: 700; color: #1a1a1a; }
        .icons { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #666; }
        .icons i { font-size: 13px; }
        .content { height: 200px; display: flex; align-items: center; justify-content: center; color: #ccc; font-size: 13px; }
    </style>
</head>
<body>
    <div style="display:flex;flex-direction:column;align-items:center;width:100%;">
        <div class="tabs">
            <div class="tab active" onclick="switchTab(0)">Default</div>
            <div class="tab" onclick="switchTab(1)">Option 1</div>
            <div class="tab" onclick="switchTab(2)">Option 2</div>
        </div>

        <!-- V1: Horizontal scroll of circular story bubbles (avatar with ring + "add" circle) -->
        <div class="variant active" id="v1">
            <div class="phone-mockup">
                <div class="status-bar">
                    <div class="notch"></div>
                    <span class="time">19:02</span>
                    <span class="icons"><i class="ri-signal-wifi-fill"></i><i class="ri-wifi-fill"></i><i class="ri-battery-2-fill"></i></span>
                </div>
                <div style="padding:0 16px 16px;display:flex;gap:12px;overflow-x:auto;">
                    <div style="width:56px;height:56px;border-radius:50%;padding:2px;border:2px solid #00615F;flex-shrink:0;">
                        <div style="width:100%;height:100%;border-radius:50%;overflow:hidden;">
                            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=80&q=80" style="width:100%;height:100%;object-fit:cover;" alt="story">
                        </div>
                    </div>
                    <div style="width:56px;height:56px;border-radius:50%;padding:2px;border:2px solid #00615F;flex-shrink:0;">
                        <div style="width:100%;height:100%;border-radius:50%;overflow:hidden;">
                            <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&w=80&q=80" style="width:100%;height:100%;object-fit:cover;" alt="story">
                        </div>
                    </div>
                    <div style="width:56px;height:56px;border-radius:50%;padding:2px;border:2px dashed #E8DDD3;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#F5EDE4;">
                        <span style="font-size:18px;color:#00615F;">+</span>
                    </div>
                </div>
                <div class="content">Page Content</div>
            </div>
        </div>

        <!-- V2: 2-row grid with avatars and names (Sarah, Mike, Add) -->
        <div class="variant" id="v2">
            <div class="phone-mockup">
                <div class="status-bar">
                    <div class="notch"></div>
                    <span class="time">19:02</span>
                    <span class="icons"><i class="ri-signal-wifi-fill"></i><i class="ri-wifi-fill"></i><i class="ri-battery-2-fill"></i></span>
                </div>
                <div style="padding:0 16px 16px;">
                    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;">
                        <div style="text-align:center;">
                            <div style="width:48px;height:48px;border-radius:50%;padding:2px;border:2px solid #00615F;margin:0 auto;"><img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=80&q=80" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" alt="avatar"></div>
                            <div style="font-size:8px;color:#888;margin-top:4px;">Sarah</div>
                        </div>
                        <div style="text-align:center;">
                            <div style="width:48px;height:48px;border-radius:50%;padding:2px;border:2px solid #00615F;margin:0 auto;"><img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&w=80&q=80" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" alt="avatar"></div>
                            <div style="font-size:8px;color:#888;margin-top:4px;">Mike</div>
                        </div>
                        <div style="text-align:center;">
                            <div style="width:48px;height:48px;border-radius:50%;padding:2px;border:2px dashed #E8DDD3;margin:0 auto;display:flex;align-items:center;justify-content:center;background:#F5EDE4;">
                                <span style="font-size:16px;color:#00615F;">+</span>
                            </div>
                            <div style="font-size:8px;color:#888;margin-top:4px;">Add</div>
                        </div>
                    </div>
                </div>
                <div class="content">Page Content</div>
            </div>
        </div>

        <!-- V3: Vertical list with avatar + name + timestamp + play button -->
        <div class="variant" id="v3">
            <div class="phone-mockup">
                <div class="status-bar">
                    <div class="notch"></div>
                    <span class="time">19:02</span>
                    <span class="icons"><i class="ri-signal-wifi-fill"></i><i class="ri-wifi-fill"></i><i class="ri-battery-2-fill"></i></span>
                </div>
                <div style="padding:0 16px 16px;display:flex;flex-direction:column;gap:8px;">
                    <div style="display:flex;align-items:center;gap:10px;background:#fff;border-radius:10px;padding:8px 12px;box-shadow:0 2px 12px rgba(0,0,0,0.06);">
                        <div style="width:40px;height:40px;border-radius:50%;padding:2px;border:2px solid #00615F;flex-shrink:0;"><img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=80&q=80" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" alt="avatar"></div>
                        <div style="flex:1;">
                            <div style="font-size:11px;font-weight:600;color:#1a1a1a;">Sarah's story</div>
                            <div style="font-size:9px;color:#888;">2h ago</div>
                        </div>
                        <div style="width:28px;height:28px;border-radius:50%;background:#F5EDE4;display:flex;align-items:center;justify-content:center;"><i class="ri-play-fill" style="color:#1A1A1A;font-size:12px;"></i></div>
                    </div>
                    <div style="display:flex;align-items:center;gap:10px;background:#fff;border-radius:10px;padding:8px 12px;box-shadow:0 2px 12px rgba(0,0,0,0.06);">
                        <div style="width:40px;height:40px;border-radius:50%;padding:2px;border:2px dashed #E8DDD3;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#F5EDE4;">
                            <span style="font-size:14px;color:#00615F;">+</span>
                        </div>
                        <div style="flex:1;">
                            <div style="font-size:11px;font-weight:600;color:#1a1a1a;">Add Story</div>
                            <div style="font-size:9px;color:#888;">Share your moment</div>
                        </div>
                    </div>
                </div>
                <div class="content">Page Content</div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(idx) {
            document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===idx));
            document.querySelectorAll('.variant').forEach((v,i) => v.classList.toggle('active', i===idx));
        }
    </script>
</body>
</html>
