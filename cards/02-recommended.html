<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommended Food Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; max-width: 360px; width: 100%; }
        .card { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .card-img-wrap { position: relative; }
        .card-img { width: 100%; height: 140px; object-fit: cover; display: block; }
        .card-heart { position: absolute; top: 10px; right: 10px; width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.92); display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.12); cursor: pointer; }
        .card-heart i { color: #ccc; font-size: 14px; }
        .card-price-badge { position: absolute; bottom: -14px; left: 50%; transform: translateX(-50%); background: #FF6B35; color: #fff; font-size: 13px; font-weight: 800; padding: 6px 18px; border-radius: 14px; white-space: nowrap; box-shadow: 0 4px 12px rgba(255,107,53,0.35); z-index: 2; }
        .card-body { padding: 14px; padding-top: 20px; }
        .card-title { font-size: 14px; font-weight: 700; color: #1a1a1a; line-height: 1.2; }
        .card-subtitle { font-size: 11px; color: #999; margin-top: 3px; }
        .card-meta { display: flex; align-items: center; gap: 12px; margin-top: 8px; }
        .meta-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #888; font-weight: 600; }
        .meta-item i { font-size: 13px; }
        .meta-item .star { color: #FFD700; }
        .meta-item .clock { color: #FF4444; }
    </style>
</head>
<body>
    <!-- MODULE: drawRecommended -->
    <!-- IMAGES: photo-1506084868230 (stir-fried dish), photo-1513558161293 (noodles) -->
    <div class="grid">
        <div class="card">
            <div class="card-img-wrap">
                <img src="https://images.unsplash.com/photo-1506084868230-bb9d95c24759?auto=format&fit=crop&w=300&q=80" class="card-img" alt="food">
                <div class="card-heart"><i class="ri-heart-line"></i></div>
                <div class="card-price-badge">$9.99</div>
            </div>
            <div class="card-body">
                <div class="card-title">Stir-Fried Spicy and Herb</div>
                <div class="card-subtitle">Herb with grouper fish</div>
                <div class="card-meta">
                    <span class="meta-item"><i class="ri-star-fill star"></i> 4.9</span>
                    <span class="meta-item"><i class="ri-time-line clock"></i> 20-25 Min</span>
                </div>
            </div>
        </div>
        <div class="card">
            <div class="card-img-wrap">
                <img src="https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?auto=format&fit=crop&w=300&q=80" class="card-img" alt="food">
                <div class="card-heart"><i class="ri-heart-line"></i></div>
                <div class="card-price-badge">$12.99</div>
            </div>
            <div class="card-body">
                <div class="card-title">Noodles With Chicken</div>
                <div class="card-subtitle">Asian noodles with chicken</div>
                <div class="card-meta">
                    <span class="meta-item"><i class="ri-star-fill star"></i> 4.9</span>
                    <span class="meta-item"><i class="ri-time-line clock"></i> 20-25 Min</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
