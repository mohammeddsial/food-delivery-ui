<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Cards</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0d0d0d; color: #fff; padding: 40px 20px; }
        h1 { text-align: center; font-size: 24px; margin-bottom: 8px; }
        .sub { text-align: center; font-size: 12px; color: #888; margin-bottom: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; max-width: 1400px; margin: 0 auto; }
        .card-link { background: #1a1a1a; border-radius: 16px; padding: 20px; text-decoration: none; color: #fff; border: 1px solid #2a2a2a; transition: border-color 0.2s, transform 0.2s; display: block; cursor: pointer; }
        .card-link:hover { border-color: #FF6B35; transform: translateY(-2px); }
        .card-num { font-size: 10px; color: #FF6B35; font-weight: 700; letter-spacing: 1px; }
        .card-name { font-size: 16px; font-weight: 700; margin-top: 4px; }
        .card-module { font-size: 11px; color: #888; margin-top: 2px; font-family: monospace; }
        .card-desc { font-size: 12px; color: #aaa; margin-top: 8px; line-height: 1.4; }
        .card-imgs { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
        .card-imgs img { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; border: 1px solid #333; }

        /* Slide Viewer */
        .viewer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; }
        .viewer-overlay.active { display: flex; }
        .viewer-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid #2a2a2a; }
        .viewer-title { font-size: 14px; font-weight: 700; }
        .viewer-counter { font-size: 12px; color: #888; }
        .viewer-close { width: 36px; height: 36px; border-radius: 50%; background: #2a2a2a; border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .viewer-close:hover { background: #FF6B35; }
        .viewer-body { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .viewer-iframe { width: 375px; height: 812px; border: none; border-radius: 16px; background: #fff; box-shadow: 0 8px 40px rgba(0,0,0,0.4); }
        .viewer-nav { position: absolute; top: 50%; transform: translateY(-50%); width: 48px; height: 48px; border-radius: 50%; background: rgba(255,107,53,0.9); border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; transition: background 0.2s; }
        .viewer-nav:hover { background: #FF6B35; }
        .viewer-nav.prev { left: 20px; }
        .viewer-nav.next { right: 20px; }
        .viewer-nav:disabled { opacity: 0.3; cursor: not-allowed; }
        .viewer-footer { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 16px; border-top: 1px solid #2a2a2a; }
        .viewer-thumb { width: 48px; height: 48px; border-radius: 8px; border: 2px solid transparent; cursor: pointer; overflow: hidden; opacity: 0.5; transition: all 0.2s; }
        .viewer-thumb.active { border-color: #FF6B35; opacity: 1; }
        .viewer-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .viewer-thumb:hover { opacity: 0.8; }

        /* Keyboard hint */
        .kbd-hint { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 8px 16px; font-size: 11px; color: #666; display: none; }
        .viewer-overlay.active .kbd-hint { display: block; }
        kbd { background: #2a2a2a; border-radius: 4px; padding: 2px 6px; font-family: monospace; color: #aaa; }
    </style>
</head>
<body>
    <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px;">
        <a href="../index.html" style="background:#FF6B35;color:#fff;padding:6px 16px;border-radius:8px;text-decoration:none;font-weight:600;font-size:12px;display:flex;align-items:center;gap:6px;"><i class="ri-home-4-fill" style="font-size:14px;"></i> Home</a>
    </div>
    <h1>All Card Components</h1>
    <div class="sub">19 Modules + 3 Bonus Cards + 7 UI Components = 29 total. Click any card to preview.</div>
    <div class="grid" id="cardGrid"></div>

    <!-- Slide Viewer -->
    <div class="viewer-overlay" id="viewer">
        <div class="viewer-header">
            <div>
                <div class="viewer-title" id="viewerTitle"></div>
                <div class="viewer-counter" id="viewerCounter"></div>
            </div>
            <button class="viewer-close" id="viewerClose">&times;</button>
        </div>
        <div class="viewer-body">
            <button class="viewer-nav prev" id="viewerPrev">&#8249;</button>
            <iframe class="viewer-iframe" id="viewerIframe" sandbox="allow-scripts allow-same-origin"></iframe>
            <button class="viewer-nav next" id="viewerNext">&#8250;</button>
        </div>
        <div class="kbd-hint">
            <kbd>&larr;</kbd> Previous &nbsp; <kbd>&rarr;</kbd> Next &nbsp; <kbd>Esc</kbd> Close
        </div>
    </div>

    <script>
    const cards = [
        { file: '13-announcement-strip.html', num: '#01', name: 'Announcement Strip', module: 'drawAnnouncementStrip', desc: 'Black bar with gold text "FREE DELIVERY ON ORDERS OVER $25"', cat: 'module' },
        { file: '14-brand-header.html', num: '#02', name: 'Brand Header', module: 'drawBrandHeader', desc: 'Address + avatar + Delivery/Pickup toggle tabs', cat: 'module', imgs: ['https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=80&q=80'] },
        { file: '15-video-hero.html', num: '#03', name: 'Video Reel Hero', module: 'drawVideoHero', desc: 'Full-width food image with play button overlay', cat: 'module', imgs: ['https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?auto=format&fit=crop&w=80&q=80'] },
        { file: '10-order-tracker.html', num: '#04', name: 'Active Order Tracker', module: 'drawActiveOrderTracker', desc: 'Orange progress bar "Delivery In Progress"', cat: 'module' },
        { file: '16-loyalty-card.html', num: '#05', name: 'Loyalty Card', module: 'drawLoyaltyCard', desc: 'Dark gradient card with gold progress bar, tier, points', cat: 'module' },
        { file: '17-finish-order.html', num: '#06', name: 'Finish Your Order', module: 'drawFinishYourOrder', desc: 'Dashed yellow border banner with cart icon + checkout button', cat: 'module' },
        { file: '01-limited-deal.html', num: '#07', name: 'Limited-Time Deal', module: 'drawLimitedTimeDeal', desc: 'Food image card with countdown timer pill', cat: 'module', imgs: ['https://images.unsplash.com/photo-1551024506-0bccd828d307?auto=format&fit=crop&w=80&q=80'] },
        { file: '06-order-again.html', num: '#08', name: 'Order Again', module: 'drawOrderAgain', desc: 'Horizontal scroll food cards with quick-add buttons', cat: 'module', imgs: ['https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?auto=format&fit=crop&w=80&q=80', 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=80&q=80'] },
        { file: '02-recommended.html', num: '#09', name: 'Recommended For You', module: 'drawRecommended', desc: '2-column grid with price badges, hearts, ratings, delivery time', cat: 'module', imgs: ['https://images.unsplash.com/photo-1506084868230-bb9d95c24759?auto=format&fit=crop&w=80&q=80', 'https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?auto=format&fit=crop&w=80&q=80'] },
        { file: '05-deals-promo.html', num: '#10', name: 'Deals & Promos', module: 'drawDealsPromos', desc: 'Orange gradient banner "25% DISCOUNT" with food image', cat: 'module', imgs: ['https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=80&q=80'] },
        { file: '18-birthday-reward.html', num: '#11', name: 'Birthday Reward', module: 'drawBirthdayBanner', desc: 'Orange text banner with gift icon "Free treat unlocked"', cat: 'module' },
        { file: '04-categories.html', num: '#12', name: 'Category Tiles', module: 'drawCategoryTiles', desc: '2x2 grid with food images, discount badges, descriptions', cat: 'module', imgs: ['https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&w=80&q=80', 'https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=80&q=80', 'https://images.unsplash.com/photo-1551024506-0bccd828d307?auto=format&fit=crop&w=80&q=80', 'https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=80&q=80'] },
        { file: '09-meal-combo.html', num: '#13', name: 'Meal-Deal Combo', module: 'drawMealCombo', desc: '"Complete the Meal" with drink + dessert add-on rows', cat: 'module', imgs: ['https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=80&q=80', 'https://images.unsplash.com/photo-1551024506-0bccd828d307?auto=format&fit=crop&w=80&q=80'] },
        { file: '19-featured-items.html', num: '#14', name: 'Featured Items', module: 'drawFeaturedItems', desc: 'Hero image card with "Free Delivery" badge, bookmark, rating, tags', cat: 'module', imgs: ['https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=80&q=80'] },
        { file: '03-popular.html', num: '#15', name: 'Popular Rail', module: 'drawPopularRail', desc: 'Horizontal scroll food cards with "View All" header', cat: 'module', imgs: ['https://images.unsplash.com/photo-1578985545062-69928b1d9587?auto=format&fit=crop&w=80&q=80', 'https://images.unsplash.com/photo-1603532648955-039310d9ed75?auto=format&fit=crop&w=80&q=80'] },
        { file: '20-offers-carousel.html', num: '#16', name: 'Offers Carousel', module: 'drawOffersCarousel', desc: 'Dark + light offer cards with codes "WELCOME5" / "WEEKEND20"', cat: 'module' },
        { file: '21-offers-feed.html', num: '#17', name: 'Offers Feed', module: 'drawOffersFeed', desc: 'List items with green/orange icons, titles, descriptions', cat: 'module' },
        { file: '07-mosaic.html', num: '#18', name: 'Image Mosaic', module: 'drawImageMosaic', desc: '2x2 photo grid with "+19" count overlay', cat: 'module', imgs: ['https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?auto=format&fit=crop&w=80&q=80', 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=80&q=80', 'https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=80&q=80'] },
        { file: '22-stories.html', num: '#19', name: 'Stories', module: 'drawStories', desc: 'Avatar circle with dark border + dashed add circle', cat: 'module', imgs: ['https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=80&q=80'] },
        { file: '08-vegan.html', num: 'B01', name: 'Vegan Cards', module: 'Bonus', desc: 'Green themed product cards with vegan/gluten-free tags', cat: 'bonus', imgs: ['https://images.unsplash.com/photo-1529042410759-befb1204b468?auto=format&fit=crop&w=80&q=80', 'https://images.unsplash.com/photo-1512621776951-a57141f2eefd?auto=format&fit=crop&w=80&q=80'] },
        { file: '12-cart-list.html', num: 'B02', name: 'Cart List', module: 'Bonus', desc: 'Items with thumbnails, names, prices, orange quantity steppers', cat: 'bonus', imgs: ['https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=80&q=80', 'https://images.unsplash.com/photo-1551024506-0bccd828d307?auto=format&fit=crop&w=80&q=80'] },
        { file: '11-restaurant.html', num: 'B03', name: 'Restaurant Card', module: 'Bonus', desc: 'Hero image with "Free Delivery" badge, bookmark, rating, tags', cat: 'bonus', imgs: ['https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=80&q=80'] },
        { file: '23-top-bar.html', num: 'U01', name: 'Top Bar', module: 'UI Component', desc: 'Status bar + brand header with menu and cart icons', cat: 'ui' },
        { file: '24-bottom-nav.html', num: 'U02', name: 'Bottom Navigation', module: 'UI Component', desc: '4-tab bottom bar with Home, Search, Favorites, Profile', cat: 'ui' },
        { file: '25-side-drawer.html', num: 'U03', name: 'Side Drawer', module: 'UI Component', desc: 'Slide-in navigation panel with brand header and nav links', cat: 'ui' },
        { file: '26-cart-popup.html', num: 'U04', name: 'Cart Popup', module: 'UI Component', desc: 'Bottom sheet cart with items, quantity steppers, checkout', cat: 'ui' },
        { file: '27-delivery-pickup.html', num: 'U05', name: 'Delivery/Pickup Toggle', module: 'UI Component', desc: 'Switchable delivery mode selector with active state', cat: 'ui' },
        { file: '28-address-dropdown.html', num: 'U06', name: 'Address Dropdown', module: 'UI Component', desc: 'Dropdown list of saved addresses with add new option', cat: 'ui' },
    ];

    const grid = document.getElementById('cardGrid');
    const viewer = document.getElementById('viewer');
    const viewerIframe = document.getElementById('viewerIframe');
    const viewerTitle = document.getElementById('viewerTitle');
    const viewerCounter = document.getElementById('viewerCounter');
    const viewerClose = document.getElementById('viewerClose');
    const viewerPrev = document.getElementById('viewerPrev');
    const viewerNext = document.getElementById('viewerNext');
    let currentIndex = 0;

    function catColor(cat) {
        if (cat === 'bonus') return '#4CAF50';
        if (cat === 'ui') return '#a78bfa';
        return '#FF6B35';
    }
    function catBorder(cat) {
        if (cat === 'bonus') return '#2a4a3a';
        if (cat === 'ui') return '#3a2a4a';
        return '#2a2a2a';
    }

    cards.forEach((c, i) => {
        const a = document.createElement('div');
        a.className = 'card-link';
        a.style.borderColor = catBorder(c.cat);
        a.dataset.index = i;
        let imgsHtml = '';
        if (c.imgs) {
            imgsHtml = '<div class="card-imgs">' + c.imgs.map(u => `<img src="${u}" alt="">`).join('') + '</div>';
        }
        a.innerHTML = `
            <div class="card-num" style="color:${catColor(c.cat)};">${c.num}</div>
            <div class="card-name">${c.name}</div>
            <div class="card-module">${c.module}</div>
            <div class="card-desc">${c.desc}</div>
            ${imgsHtml}
        `;
        a.addEventListener('click', () => openViewer(i));
        grid.appendChild(a);
    });

    function openViewer(index) {
        currentIndex = index;
        updateViewer();
        viewer.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeViewer() {
        viewer.classList.remove('active');
        document.body.style.overflow = '';
        viewerIframe.src = '';
    }

    function updateViewer() {
        const c = cards[currentIndex];
        viewerIframe.src = c.file;
        viewerTitle.textContent = `${c.num} ${c.name}`;
        viewerCounter.textContent = `${currentIndex + 1} / ${cards.length}`;
        viewerPrev.disabled = currentIndex === 0;
        viewerNext.disabled = currentIndex === cards.length - 1;
    }

    function goNext() {
        if (currentIndex < cards.length - 1) {
            currentIndex++;
            updateViewer();
        }
    }

    function goPrev() {
        if (currentIndex > 0) {
            currentIndex--;
            updateViewer();
        }
    }

    viewerClose.addEventListener('click', closeViewer);
    viewerPrev.addEventListener('click', goPrev);
    viewerNext.addEventListener('click', goNext);

    viewer.addEventListener('click', (e) => {
        if (e.target === viewer) closeViewer();
    });

    document.addEventListener('keydown', (e) => {
        if (!viewer.classList.contains('active')) return;
        if (e.key === 'Escape') closeViewer();
        if (e.key === 'ArrowRight') goNext();
        if (e.key === 'ArrowLeft') goPrev();
    });
    </script>
</body>
</html>
