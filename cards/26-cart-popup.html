<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart Popup</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .phone { width: 375px; height: 600px; background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.12); position: relative; }
        .status-bar { height: 44px; background: #fff; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 24px 8px; position: relative; z-index: 60; }
        .notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 120px; height: 28px; background: #000; border-radius: 0 0 20px 20px; }
        .time { font-size: 15px; font-weight: 700; color: #1a1a1a; }
        .s-icons { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #666; }
        .s-icons i { font-size: 13px; }
        .nav-row { padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; position: relative; z-index: 60; background: #fff; }
        .nav-left { display: flex; align-items: center; gap: 10px; }
        .hamburger { width: 32px; height: 32px; border-radius: 10px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; }
        .hamburger i { font-size: 16px; color: #333; }
        .brand { font-size: 14px; font-weight: 800; color: #1a1a1a; }
        .cart-btn { width: 36px; height: 36px; border-radius: 12px; background: #FF6B35; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; border: none; }
        .cart-btn i { color: #fff; font-size: 18px; }
        .cart-badge { position: absolute; top: -4px; right: -4px; width: 16px; height: 16px; background: #1a1a1a; color: #fff; font-size: 9px; font-weight: 700; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #fff; }
        .content { height: 488px; display: flex; align-items: center; justify-content: center; color: #ccc; font-size: 13px; }

        /* Cart Overlay */
        .cart-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); z-index: 70; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .cart-overlay.open { opacity: 1; pointer-events: auto; }

        /* Cart Panel */
        .cart-panel { position: absolute; bottom: 0; left: 0; right: 0; background: #fff; border-radius: 24px 24px 0 0; z-index: 80; transform: translateY(100%); transition: transform 0.3s ease; max-height: 70%; display: flex; flex-direction: column; }
        .cart-panel.open { transform: translateY(0); }
        .cart-handle { display: flex; justify-content: center; padding: 12px; }
        .cart-handle div { width: 40px; height: 4px; background: #ddd; border-radius: 2px; }
        .cart-header { padding: 0 20px 16px; display: flex; align-items: center; justify-content: space-between; }
        .cart-title { font-size: 18px; font-weight: 800; color: #1a1a1a; }
        .cart-count { font-size: 12px; color: #999; }
        .cart-items { flex: 1; overflow-y: auto; padding: 0 20px; }
        .cart-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        .cart-item-img { width: 56px; height: 56px; border-radius: 14px; object-fit: cover; flex-shrink: 0; }
        .cart-item-info { flex: 1; }
        .cart-item-name { font-size: 13px; font-weight: 700; color: #1a1a1a; }
        .cart-item-desc { font-size: 11px; color: #999; margin-top: 2px; }
        .cart-item-price { font-size: 13px; font-weight: 700; color: #FF6B35; margin-top: 4px; }
        .qty-stepper { display: flex; align-items: center; background: #FF6B35; border-radius: 20px; overflow: hidden; flex-shrink: 0; }
        .qty-btn { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; border: none; background: transparent; }
        .qty-num { width: 20px; text-align: center; color: #fff; font-size: 12px; font-weight: 800; }
        .cart-footer { padding: 16px 20px; border-top: 1px solid #eee; }
        .cart-total { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .cart-total-label { font-size: 14px; font-weight: 600; color: #666; }
        .cart-total-price { font-size: 18px; font-weight: 800; color: #1a1a1a; }
        .checkout-btn { width: 100%; padding: 14px; border-radius: 14px; background: #FF6B35; color: #fff; font-size: 14px; font-weight: 700; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <!-- MODULE: Cart Popup -->
    <div class="phone">
        <div class="status-bar">
            <div class="notch"></div>
            <span class="time">19:02</span>
            <span class="s-icons"><i class="ri-signal-wifi-fill"></i><i class="ri-wifi-fill"></i><i class="ri-battery-2-fill"></i></span>
        </div>
        <div class="nav-row">
            <div class="nav-left">
                <button class="hamburger"><i class="ri-menu-2-fill"></i></button>
                <span class="brand">Food Hub</span>
            </div>
            <button class="cart-btn" id="openCart"><i class="ri-shopping-bag-3-fill"></i><span class="cart-badge">3</span></button>
        </div>
        <div class="content">Tap cart icon to open popup</div>

        <div class="cart-overlay" id="cartOverlay"></div>
        <div class="cart-panel" id="cartPanel">
            <div class="cart-handle"><div></div></div>
            <div class="cart-header">
                <span class="cart-title">My Cart</span>
                <span class="cart-count">3 items</span>
            </div>
            <div class="cart-items">
                <div class="cart-item">
                    <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?auto=format&fit=crop&w=80&q=80" class="cart-item-img" alt="food">
                    <div class="cart-item-info">
                        <div class="cart-item-name">Pepperoni Pizza</div>
                        <div class="cart-item-desc">Extra cheese, thin crust</div>
                        <div class="cart-item-price">$9.99</div>
                    </div>
                    <div class="qty-stepper">
                        <button class="qty-btn">-</button>
                        <span class="qty-num">1</span>
                        <button class="qty-btn">+</button>
                    </div>
                </div>
                <div class="cart-item">
                    <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=80&q=80" class="cart-item-img" alt="food">
                    <div class="cart-item-info">
                        <div class="cart-item-name">Beef Burger</div>
                        <div class="cart-item-desc">Classic double patty</div>
                        <div class="cart-item-price">$7.99</div>
                    </div>
                    <div class="qty-stepper">
                        <button class="qty-btn">-</button>
                        <span class="qty-num">2</span>
                        <button class="qty-btn">+</button>
                    </div>
                </div>
                <div class="cart-item">
                    <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=80&q=80" class="cart-item-img" alt="food">
                    <div class="cart-item-info">
                        <div class="cart-item-name">Craft Latte</div>
                        <div class="cart-item-desc">Oat milk, no sugar</div>
                        <div class="cart-item-price">$4.50</div>
                    </div>
                    <div class="qty-stepper">
                        <button class="qty-btn">-</button>
                        <span class="qty-num">1</span>
                        <button class="qty-btn">+</button>
                    </div>
                </div>
            </div>
            <div class="cart-footer">
                <div class="cart-total">
                    <span class="cart-total-label">Total</span>
                    <span class="cart-total-price">$30.47</span>
                </div>
                <button class="checkout-btn">Checkout</button>
            </div>
        </div>
    </div>
    <script>
        const openCart = document.getElementById('openCart');
        const cartOverlay = document.getElementById('cartOverlay');
        const cartPanel = document.getElementById('cartPanel');

        function open() { cartOverlay.classList.add('open'); cartPanel.classList.add('open'); }
        function close() { cartOverlay.classList.remove('open'); cartPanel.classList.remove('open'); }

        openCart.addEventListener('click', open);
        cartOverlay.addEventListener('click', close);
    </script>
</body>
</html>
