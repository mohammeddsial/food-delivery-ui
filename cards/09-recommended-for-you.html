<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommended For You Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f5f5; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .variant-tabs { display: flex; gap: 8px; margin-bottom: 24px; }
        .variant-tab { padding: 8px 16px; border-radius: 8px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-size: 12px; font-weight: 600; color: #666; transition: all 0.2s; }
        .variant-tab.active { background: #00615F; color: #fff; border-color: #00615F; }
        .variant-tab:hover:not(.active) { border-color: #00615F; }
        .variant { display: none; }
        .variant.active { display: block; }

        /* V1: Image Top */
        .v1-card { background: #fff; border-radius: 20px; overflow: hidden; max-width: 280px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .v1-img-wrap { position: relative; }
        .v1-img { width: 100%; height: 180px; object-fit: cover; }
        .v1-badge { position: absolute; top: 10px; left: 10px; background: #00615F; color: #fff; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; }
        .v1-heart { position: absolute; top: 10px; right: 10px; width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; }
        .v1-body { padding: 14px; }
        .v1-title { font-size: 15px; font-weight: 700; color: #1a1a1a; }
        .v1-meta { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
        .v1-rating { display: flex; align-items: center; gap: 3px; font-size: 12px; font-weight: 600; color: #FF9800; }
        .v1-time { font-size: 12px; color: #888; }
        .v1-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
        .v1-price { font-size: 18px; font-weight: 800; color: #1a1a1a; }
        .v1-add { padding: 8px 16px; border-radius: 10px; background: #00615F; color: #fff; border: none; font-weight: 700; font-size: 12px; cursor: pointer; }

        /* V2: Image Left */
        .v2-card { background: #fff; border-radius: 16px; overflow: hidden; max-width: 340px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.08); display: flex; height: 120px; }
        .v2-img-wrap { position: relative; width: 120px; flex-shrink: 0; }
        .v2-img { width: 100%; height: 100%; object-fit: cover; }
        .v2-body { padding: 14px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .v2-title { font-size: 14px; font-weight: 700; color: #1a1a1a; }
        .v2-meta { font-size: 11px; color: #888; margin-top: 4px; }
        .v2-footer { display: flex; align-items: center; justify-content: space-between; }
        .v2-price { font-size: 16px; font-weight: 800; color: #00615F; }
        .v2-add { border-radius: 20px; padding: 6px 14px; width: auto; background: #00615F; border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* V3: Minimal */
        .v3-card { background: #fff; border-radius: 16px; padding: 16px; max-width: 280px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .v3-row { display: flex; align-items: center; gap: 14px; }
        .v3-icon { width: 52px; height: 52px; border-radius: 14px; background: #FFF3E0; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .v3-icon i { font-size: 22px; color: #00615F; }
        .v3-info { flex: 1; }
        .v3-title { font-size: 14px; font-weight: 700; color: #1a1a1a; }
        .v3-meta { font-size: 11px; color: #888; margin-top: 2px; }
        .v3-price { font-size: 16px; font-weight: 800; color: #1a1a1a; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="variant-tabs">
        <div class="variant-tab active" onclick="showVariant(1)">Image Top</div>
        <div class="variant-tab" onclick="showVariant(2)">Image Left</div>
        <div class="variant-tab" onclick="showVariant(3)">Minimal</div>
    </div>

    <div class="variant v1 active" id="v1">
        <div class="v1-card">
            <div class="v1-img-wrap">
                <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?auto=format&fit=crop&w=400&q=80" class="v1-img" alt="pizza">
                <div class="v1-badge">$12.99</div>
                <div class="v1-heart"><i class="ri-heart-line" style="color:#ccc;font-size:14px;"></i></div>
            </div>
            <div class="v1-body">
                <div class="v1-title">Margherita Pizza</div>
                <div class="v1-meta">
                    <span class="v1-rating"><i class="ri-star-fill" style="font-size:12px;"></i> 4.8</span>
                    <span class="v1-time">25 min</span>
                </div>
                <div class="v1-footer">
                    <span class="v1-price">$12.99</span>
                    <button class="v1-add">Add</button>
                </div>
            </div>
        </div>
    </div>

    <div class="variant" id="v2">
        <div class="v2-card">
            <div class="v2-img-wrap">
                <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?auto=format&fit=crop&w=400&q=80" class="v2-img" alt="pizza">
            </div>
            <div class="v2-body">
                <div>
                    <div class="v2-title">Margherita Pizza</div>
                    <div class="v2-meta">4.8  25 min</div>
                </div>
                <div class="v2-footer">
                    <span class="v2-price">$12.99</span>
                    <button class="v2-add"><i class="ri-add-line"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div class="variant" id="v3">
        <div class="v3-card">
            <div class="v3-row">
                <div class="v3-icon"><i class="ri-restaurant-line"></i></div>
                <div class="v3-info">
                    <div class="v3-title">Margherita Pizza</div>
                    <div class="v3-meta">4.8  25 min  Italian</div>
                </div>
            </div>
            <div class="v3-price">$12.99</div>
        </div>
    </div>

    <script>
    function showVariant(n) {
        document.querySelectorAll('.variant').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.variant-tab').forEach(t => t.classList.remove('active'));
        document.getElementById('v' + n).classList.add('active');
        document.querySelectorAll('.variant-tab')[n - 1].classList.add('active');
    }
    </script>
</body>
</html>
