<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finish Your Order</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f5f5; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; background: #fff; padding: 6px; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .tab { padding: 10px 18px; border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer; border: none; background: transparent; color: #999; transition: all 0.2s; }
        .tab.active { background: #00615F; color: #fff; }
        .tab:hover:not(.active) { background: #f5f5f5; }
        .variant { display: none; }
        .variant.active { display: block; }

        /* V1: Image Top */
        .v1-card { max-width: 360px; width: 100%; background: #fff; border-radius: 18px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .v1-img { width: 100%; height: 100px; background: linear-gradient(135deg, #FFB300, #00615F); display: flex; align-items: center; justify-content: center; }
        .v1-img i { font-size: 36px; color: #fff; }
        .v1-body { padding: 16px; text-align: center; }
        .v1-title { font-size: 16px; font-weight: 800; color: #1a1a1a; }
        .v1-sub { font-size: 12px; color: #999; margin-top: 4px; }
        .v1-btn { margin-top: 14px; width: 100%; padding: 12px; border-radius: 12px; background: #00615F; color: #fff; font-size: 13px; font-weight: 700; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* V2: Image Left */
        .v2-card { max-width: 360px; width: 100%; background: #fff; border-radius: 18px; padding: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); display: flex; align-items: center; gap: 14px; }
        .v2-icon { width: 50px; height: 50px; border-radius: 14px; background: linear-gradient(135deg, #FFB300, #00615F); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .v2-icon i { color: #fff; font-size: 22px; }
        .v2-body { flex: 1; }
        .v2-title { font-size: 14px; font-weight: 800; color: #1a1a1a; }
        .v2-sub { font-size: 11px; color: #999; margin-top: 2px; }
        .v2-btn { padding: 10px 18px; border-radius: 10px; background: #00615F; color: #fff; font-size: 12px; font-weight: 700; border: none; cursor: pointer; flex-shrink: 0; }

        /* V3: Minimal */
        .v3-card { max-width: 360px; width: 100%; background: #FFF8E1; border: 2px dashed #FFB300; border-radius: 18px; padding: 16px; display: flex; align-items: center; justify-content: space-between; }
        .v3-left { display: flex; align-items: center; gap: 12px; }
        .v3-icon { width: 40px; height: 40px; border-radius: 12px; background: #FFB300; display: flex; align-items: center; justify-content: center; }
        .v3-icon i { color: #fff; font-size: 18px; }
        .v3-text { font-size: 13px; font-weight: 700; color: #333; }
        .v3-sub { font-size: 11px; color: #999; margin-top: 2px; }
        .v3-btn { background: #00615F; color: #fff; font-size: 11px; font-weight: 700; padding: 10px 18px; border-radius: 12px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="tabs">
        <button class="tab active" onclick="switchTab('v1')">Image Top</button>
        <button class="tab" onclick="switchTab('v2')">Image Left</button>
        <button class="tab" onclick="switchTab('v3')">Minimal</button>
    </div>

    <!-- V1: Image Top -->
    <div class="variant active" id="v1">
        <div class="v1-card">
            <div class="v1-img"><i class="ri-shopping-cart-2-fill"></i></div>
            <div class="v1-body">
                <div class="v1-title">Cart Waiting</div>
                <div class="v1-sub">2 items in your cart</div>
                <button class="v1-btn"><i class="ri-arrow-right-line"></i> Checkout Now</button>
            </div>
        </div>
    </div>

    <!-- V2: Image Left -->
    <div class="variant" id="v2">
        <div class="v2-card">
            <div class="v2-icon"><i class="ri-shopping-cart-2-fill"></i></div>
            <div class="v2-body">
                <div class="v2-title">Cart Waiting</div>
                <div class="v2-sub">2 items in your cart</div>
            </div>
            <button class="v2-btn">Checkout</button>
        </div>
    </div>

    <!-- V3: Minimal -->
    <div class="variant" id="v3">
        <div class="v3-card">
            <div class="v3-left">
                <div class="v3-icon"><i class="ri-shopping-cart-2-fill"></i></div>
                <div>
                    <div class="v3-text">Cart Waiting</div>
                    <div class="v3-sub">2 items in your cart</div>
                </div>
            </div>
            <button class="v3-btn">Checkout</button>
        </div>
    </div>

    <script>
        function switchTab(id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.variant').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
