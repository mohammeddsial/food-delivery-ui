<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finish Your Order</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .banner { max-width: 360px; width: 100%; background: #FFF8E1; border: 2px dashed #FFB300; border-radius: 18px; padding: 16px; display: flex; align-items: center; justify-content: space-between; }
        .banner-left { display: flex; align-items: center; gap: 12px; }
        .banner-icon { width: 40px; height: 40px; border-radius: 12px; background: #FFB300; display: flex; align-items: center; justify-content: center; }
        .banner-icon i { color: #fff; font-size: 18px; }
        .banner-text { font-size: 13px; font-weight: 700; color: #333; }
        .banner-sub { font-size: 11px; color: #999; margin-top: 2px; }
        .banner-btn { background: #FF6B35; color: #fff; font-size: 11px; font-weight: 700; padding: 10px 18px; border-radius: 12px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <!-- MODULE: drawFinishYourOrder -->
    <div class="banner">
        <div class="banner-left">
            <div class="banner-icon"><i class="ri-shopping-cart-2-fill"></i></div>
            <div>
                <div class="banner-text">Cart Waiting</div>
                <div class="banner-sub">2 items in your cart</div>
            </div>
        </div>
        <button class="banner-btn">Checkout</button>
    </div>
</body>
</html>
