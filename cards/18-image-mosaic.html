<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Mosaic</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .tabs { display: flex; gap: 6px; margin-bottom: 16px; justify-content: center; max-width: 360px; width: 100%; }
        .tab { padding: 8px 14px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; border: 1.5px solid #ddd; background: #fff; color: #666; transition: all 0.2s; }
        .tab.active { background: #00615F; color: #fff; border-color: #00615F; }
        .variant { display: none; max-width: 360px; width: 100%; }
        .variant.active { display: block; }
        :root { --card-bg: #ffffff; --card-radius: 16px; --card-shadow: 0 2px 12px rgba(0,0,0,0.06); --accent: #00615F; --accent-light: #F0F7F6; --text-primary: #1a1a1a; --text-secondary: #888; --btn-radius: 12px; }

        .phone-mockup { width: 375px; background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.12); }
        .status-bar { height: 44px; background: #fff; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 24px 8px; position: relative; }
        .notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 120px; height: 28px; background: #000; border-radius: 0 0 20px 20px; }
        .time { font-size: 15px; font-weight: 700; color: #1a1a1a; }
        .icons { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #666; }
        .icons i { font-size: 13px; }
        .content { height: 200px; display: flex; align-items: center; justify-content: center; color: #ccc; font-size: 13px; }
    </style>
</head>
<body>
    <div style="display:flex;flex-direction:column;align-items:center;width:100%;">
        <div class="tabs">
            <div class="tab active" onclick="switchTab(0)">Default</div>
            <div class="tab" onclick="switchTab(1)">Option 1</div>
            <div class="tab" onclick="switchTab(2)">Option 2</div>
        </div>

        <!-- V1: 2x2 grid of food images with "+19" overlay on last tile -->
        <div class="variant active" id="v1">
            <div class="phone-mockup">
                <div class="status-bar">
                    <div class="notch"></div>
                    <span class="time">19:02</span>
                    <span class="icons"><i class="ri-signal-wifi-fill"></i><i class="ri-wifi-fill"></i><i class="ri-battery-2-fill"></i></span>
                </div>
                <div style="padding:0 16px 16px;display:grid;grid-template-columns:1fr 1fr;gap:10px;">
                    <div style="height:130px;border-radius:16px;overflow:hidden;border:1px solid #E8DDD3;box-shadow:0 2px 8px rgba(61,50,41,0.06);"><img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?auto=format&fit=crop&w=400&q=80" style="width:100%;height:100%;object-fit:cover;" alt="food1"></div>
                    <div style="height:130px;border-radius:16px;overflow:hidden;border:1px solid #E8DDD3;box-shadow:0 2px 8px rgba(61,50,41,0.06);"><img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=400&q=80" style="width:100%;height:100%;object-fit:cover;" alt="food2"></div>
                    <div style="height:130px;border-radius:16px;overflow:hidden;border:1px solid #E8DDD3;box-shadow:0 2px 8px rgba(61,50,41,0.06);"><img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=400&q=80" style="width:100%;height:100%;object-fit:cover;" alt="food3"></div>
                    <div style="height:130px;border-radius:16px;overflow:hidden;border:1px solid #E8DDD3;box-shadow:0 2px 8px rgba(61,50,41,0.06);position:relative;">
                        <img src="https://images.unsplash.com/photo-1555507036-ab1f4038808a?auto=format&fit=crop&w=400&q=80" style="width:100%;height:100%;object-fit:cover;" alt="food4">
                        <div style="position:absolute;inset:0;background:rgba(61,50,41,0.5);display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:700;">+19</div>
                    </div>
                </div>
                <div class="content">Page Content</div>
            </div>
        </div>

        <!-- V2: Horizontal scroll of food images -->
        <div class="variant" id="v2">
            <div class="phone-mockup">
                <div class="status-bar">
                    <div class="notch"></div>
                    <span class="time">19:02</span>
                    <span class="icons"><i class="ri-signal-wifi-fill"></i><i class="ri-wifi-fill"></i><i class="ri-battery-2-fill"></i></span>
                </div>
                <div style="padding:0 16px 16px;display:flex;gap:10px;overflow-x:auto;">
                    <div style="flex-shrink:0;width:140px;height:120px;border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.06);"><img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?auto=format&fit=crop&w=400&q=80" style="width:100%;height:100%;object-fit:cover;" alt="food1"></div>
                    <div style="flex-shrink:0;width:140px;height:120px;border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.06);"><img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=400&q=80" style="width:100%;height:100%;object-fit:cover;" alt="food2"></div>
                    <div style="flex-shrink:0;width:140px;height:120px;border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.06);"><img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=400&q=80" style="width:100%;height:100%;object-fit:cover;" alt="food3"></div>
                </div>
                <div class="content">Page Content</div>
            </div>
        </div>

        <!-- V3: Large + small mosaic layout (1 big image spanning 2 rows + 2 small images) -->
        <div class="variant" id="v3">
            <div class="phone-mockup">
                <div class="status-bar">
                    <div class="notch"></div>
                    <span class="time">19:02</span>
                    <span class="icons"><i class="ri-signal-wifi-fill"></i><i class="ri-wifi-fill"></i><i class="ri-battery-2-fill"></i></span>
                </div>
                <div style="padding:0 16px 16px;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:8px;height:200px;">
                    <div style="grid-row:1/3;border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.06);"><img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?auto=format&fit=crop&w=400&q=80" style="width:100%;height:100%;object-fit:cover;" alt="food1"></div>
                    <div style="border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.06);"><img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=400&q=80" style="width:100%;height:100%;object-fit:cover;" alt="food2"></div>
                    <div style="border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.06);position:relative;">
                        <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=400&q=80" style="width:100%;height:100%;object-fit:cover;" alt="food3">
                        <div style="position:absolute;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:700;">+19</div>
                    </div>
                </div>
                <div class="content">Page Content</div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(idx) {
            document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===idx));
            document.querySelectorAll('.variant').forEach((v,i) => v.classList.toggle('active', i===idx));
        }
    </script>
</body>
</html>
