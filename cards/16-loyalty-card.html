<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loyalty Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { max-width: 320px; width: 100%; background: linear-gradient(135deg, #1a1a1a, #333); border-radius: 20px; padding: 20px; color: #fff; position: relative; overflow: hidden; }
        .card-circle1 { position: absolute; top: -20px; right: -20px; width: 100px; height: 100px; border-radius: 50%; background: rgba(255,107,53,0.15); }
        .card-circle2 { position: absolute; bottom: -30px; left: -10px; width: 80px; height: 80px; border-radius: 50%; background: rgba(255,107,53,0.1); }
        .card-content { position: relative; z-index: 1; }
        .card-top { display: flex; justify-content: space-between; align-items: start; }
        .card-tier-label { font-size: 10px; color: #aaa; letter-spacing: 1px; text-transform: uppercase; }
        .card-tier-name { font-size: 18px; font-weight: 900; margin-top: 2px; }
        .card-pts { font-size: 11px; color: #FF8F65; background: rgba(255,107,53,0.2); padding: 5px 12px; border-radius: 20px; }
        .card-progress { margin-top: 18px; }
        .progress-header { display: flex; justify-content: space-between; font-size: 10px; color: #aaa; margin-bottom: 6px; }
        .progress-bar { height: 5px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; width: 75%; background: linear-gradient(90deg, #FF6B35, #FFD700); border-radius: 3px; }
        .card-badges { margin-top: 16px; display: flex; gap: 8px; }
        .badge { font-size: 10px; background: rgba(255,255,255,0.08); padding: 5px 12px; border-radius: 10px; color: #ccc; }
    </style>
</head>
<body>
    <!-- MODULE: drawLoyaltyCard -->
    <div class="card">
        <div class="card-circle1"></div>
        <div class="card-circle2"></div>
        <div class="card-content">
            <div class="card-top">
                <div>
                    <div class="card-tier-label">Membership Tier</div>
                    <div class="card-tier-name">Gold Member</div>
                </div>
                <div class="card-pts">420 pts</div>
            </div>
            <div class="card-progress">
                <div class="progress-header">
                    <span>Progress to Platinum</span>
                    <span>80 pts away</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
            </div>
            <div class="card-badges">
                <span class="badge">5% Cashback</span>
                <span class="badge">Free Delivery</span>
            </div>
        </div>
    </div>
</body>
</html>
