<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal-Deal Combo</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .tabs { display: flex; gap: 6px; margin-bottom: 16px; justify-content: center; max-width: 360px; width: 100%; }
        .tab { padding: 8px 14px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; border: 1.5px solid #ddd; background: #fff; color: #666; transition: all 0.2s; }
        .tab.active { background: #00615F; color: #fff; border-color: #00615F; }
        .variant { display: none; max-width: 360px; width: 100%; }
        .variant.active { display: block; }
        :root { --card-bg: #ffffff; --card-radius: 16px; --card-shadow: 0 2px 12px rgba(0,0,0,0.06); --accent: #00615F; --accent-light: #F0F7F6; --text-primary: #1a1a1a; --text-secondary: #888; --btn-radius: 12px; --pill-bg: #E8DDD3; }
    </style>
</head>
<body>
    <div style="display:flex;flex-direction:column;align-items:center;width:100%;">
        <div class="tabs">
            <div class="tab active" onclick="switchTab(0)">Default</div>
            <div class="tab" onclick="switchTab(1)">Option 1</div>
            <div class="tab" onclick="switchTab(2)">Option 2</div>
        </div>

        <!-- V1: Vertical list of items with images -->
        <div class="variant active" id="v1">
            <div style="width:375px;height:812px;background:#f5f5f5;border-radius:40px;overflow:hidden;border:10px solid #1a1a1a;position:relative;">
                <div style="height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;font-size:12px;font-weight:600;">
                    <span>19:02</span>
                    <div style="width:80px;height:28px;background:#000;border-radius:20px;position:absolute;left:50%;transform:translateX(-50%);top:4px;"></div>
                    <div style="display:flex;gap:6px;align-items:center;">
                        <i class="ri-signal-wifi-fill" style="font-size:14px;"></i>
                        <i class="ri-battery-fill" style="font-size:14px;"></i>
                    </div>
                </div>
                <div style="padding:0 16px 16px;">
                    <div style="background:var(--card-bg);border-radius:16px;padding:16px;box-shadow:var(--card-shadow);">
                        <div style="font-size:12px;font-weight:700;color:var(--text-primary);margin-bottom:12px;display:flex;align-items:center;gap:6px;">
                            <i class="ri-layers-fill" style="font-size:14px;color:var(--text-primary);"></i> Complete the Meal
                        </div>
                        <div style="display:flex;flex-direction:column;gap:8px;">
                            <div style="background:#F9F3F0;border-radius:12px;padding:10px;display:flex;align-items:center;justify-content:space-between;">
                                <div style="display:flex;align-items:center;gap:10px;">
                                    <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=100&q=80" style="width:40px;height:40px;border-radius:10px;object-fit:cover;" alt="Craft Latte">
                                    <span style="font-size:11px;font-weight:600;color:var(--text-primary);">Craft Latte</span>
                                </div>
                                <span style="font-size:11px;font-weight:700;color:var(--accent);">+$3.50</span>
                            </div>
                            <div style="background:#F9F3F0;border-radius:12px;padding:10px;display:flex;align-items:center;justify-content:space-between;">
                                <div style="display:flex;align-items:center;gap:10px;">
                                    <img src="https://images.unsplash.com/photo-1551024506-0bccd828d307?auto=format&fit=crop&w=100&q=80" style="width:40px;height:40px;border-radius:10px;object-fit:cover;" alt="Croissant">
                                    <span style="font-size:11px;font-weight:600;color:var(--text-primary);">Croissant</span>
                                </div>
                                <span style="font-size:11px;font-weight:700;color:var(--accent);">+$2.50</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- V2: Horizontal scroll cards -->
        <div class="variant" id="v2">
            <div style="width:375px;height:812px;background:#f5f5f5;border-radius:40px;overflow:hidden;border:10px solid #1a1a1a;position:relative;">
                <div style="height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;font-size:12px;font-weight:600;">
                    <span>19:02</span>
                    <div style="width:80px;height:28px;background:#000;border-radius:20px;position:absolute;left:50%;transform:translateX(-50%);top:4px;"></div>
                    <div style="display:flex;gap:6px;align-items:center;">
                        <i class="ri-signal-wifi-fill" style="font-size:14px;"></i>
                        <i class="ri-battery-fill" style="font-size:14px;"></i>
                    </div>
                </div>
                <div style="padding:0 16px 16px;">
                    <div style="font-size:12px;font-weight:700;color:var(--text-primary);margin-bottom:10px;display:flex;align-items:center;gap:6px;">
                        <i class="ri-layers-fill" style="font-size:14px;color:var(--text-primary);"></i> Complete the Meal
                    </div>
                    <div style="display:flex;gap:10px;overflow-x:auto;">
                        <div style="flex-shrink:0;width:140px;background:var(--card-bg);border-radius:12px;overflow:hidden;box-shadow:var(--card-shadow);">
                            <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=200&q=80" style="width:100%;height:80px;object-fit:cover;" alt="Craft Latte">
                            <div style="padding:8px;">
                                <div style="font-size:10px;font-weight:600;color:var(--text-primary);">Craft Latte</div>
                                <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px;">
                                    <span style="font-size:11px;font-weight:700;color:var(--accent);">+$3.50</span>
                                    <div style="width:20px;height:20px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;cursor:pointer;">
                                        <i class="ri-add-line" style="font-size:12px;color:#fff;"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div style="flex-shrink:0;width:140px;background:var(--card-bg);border-radius:12px;overflow:hidden;box-shadow:var(--card-shadow);">
                            <img src="https://images.unsplash.com/photo-1551024506-0bccd828d307?auto=format&fit=crop&w=200&q=80" style="width:100%;height:80px;object-fit:cover;" alt="Croissant">
                            <div style="padding:8px;">
                                <div style="font-size:10px;font-weight:600;color:var(--text-primary);">Croissant</div>
                                <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px;">
                                    <span style="font-size:11px;font-weight:700;color:var(--accent);">+$2.50</span>
                                    <div style="width:20px;height:20px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;cursor:pointer;">
                                        <i class="ri-add-line" style="font-size:12px;color:#fff;"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- V3: Compact list with toggle switches -->
        <div class="variant" id="v3">
            <div style="width:375px;height:812px;background:#f5f5f5;border-radius:40px;overflow:hidden;border:10px solid #1a1a1a;position:relative;">
                <div style="height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;font-size:12px;font-weight:600;">
                    <span>19:02</span>
                    <div style="width:80px;height:28px;background:#000;border-radius:20px;position:absolute;left:50%;transform:translateX(-50%);top:4px;"></div>
                    <div style="display:flex;gap:6px;align-items:center;">
                        <i class="ri-signal-wifi-fill" style="font-size:14px;"></i>
                        <i class="ri-battery-fill" style="font-size:14px;"></i>
                    </div>
                </div>
                <div style="padding:0 16px 16px;">
                    <div style="background:var(--card-bg);border-radius:14px;padding:14px;box-shadow:var(--card-shadow);">
                        <div style="font-size:12px;font-weight:700;color:var(--text-primary);margin-bottom:10px;">Complete the Meal</div>
                        <div style="display:flex;flex-direction:column;gap:8px;">
                            <div style="display:flex;align-items:center;justify-content:space-between;">
                                <div style="display:flex;align-items:center;gap:8px;">
                                    <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=60&q=80" style="width:32px;height:32px;border-radius:6px;object-fit:cover;" alt="Craft Latte">
                                    <div>
                                        <div style="font-size:11px;font-weight:600;color:var(--text-primary);">Add Craft Latte</div>
                                        <div style="font-size:9px;color:var(--text-secondary);">+$3.50</div>
                                    </div>
                                </div>
                                <div style="width:36px;height:20px;border-radius:10px;background:var(--pill-bg);position:relative;cursor:pointer;">
                                    <div style="width:16px;height:16px;border-radius:50%;background:var(--text-secondary);position:absolute;top:2px;left:2px;"></div>
                                </div>
                            </div>
                            <div style="display:flex;align-items:center;justify-content:space-between;">
                                <div style="display:flex;align-items:center;gap:8px;">
                                    <img src="https://images.unsplash.com/photo-1551024506-0bccd828d307?auto=format&fit=crop&w=60&q=80" style="width:32px;height:32px;border-radius:6px;object-fit:cover;" alt="Croissant">
                                    <div>
                                        <div style="font-size:11px;font-weight:600;color:var(--text-primary);">Add Croissant</div>
                                        <div style="font-size:9px;color:var(--text-secondary);">+$2.50</div>
                                    </div>
                                </div>
                                <div style="width:36px;height:20px;border-radius:10px;background:var(--accent);position:relative;cursor:pointer;">
                                    <div style="width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:2px;right:2px;"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(idx) {
            document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===idx));
            document.querySelectorAll('.variant').forEach((v,i) => v.classList.toggle('active', i===idx));
        }
    </script>
</body>
</html>
