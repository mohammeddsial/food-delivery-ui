<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popular Rail Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f5f5; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .variant-tabs { display: flex; gap: 8px; margin-bottom: 24px; }
        .variant-tab { padding: 8px 16px; border-radius: 8px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-size: 12px; font-weight: 600; color: #666; transition: all 0.2s; }
        .variant-tab.active { background: #00615F; color: #fff; border-color: #00615F; }
        .variant { display: none; }
        .variant.active { display: block; }

        /* V1: Image Top */
        .v1-card { background: #fff; border-radius: 20px; overflow: hidden; max-width: 200px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.08); flex-shrink: 0; }
        .v1-img { width: 100%; height: 140px; object-fit: cover; }
        .v1-body { padding: 12px; }
        .v1-title { font-size: 14px; font-weight: 700; color: #1a1a1a; }
        .v1-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; font-size: 11px; color: #888; }
        .v1-price { font-size: 16px; font-weight: 800; color: #00615F; margin-top: 8px; }

        /* V2: Image Left */
        .v2-card { background: #fff; border-radius: 14px; overflow: hidden; max-width: 300px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.08); display: flex; height: 100px; }
        .v2-img { width: 100px; height: 100%; object-fit: cover; flex-shrink: 0; }
        .v2-body { padding: 12px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .v2-title { font-size: 13px; font-weight: 700; color: #1a1a1a; }
        .v2-price { font-size: 15px; font-weight: 800; color: #00615F; }

        /* V3: Minimal */
        .v3-card { background: #fff; border-radius: 12px; padding: 14px; max-width: 260px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.08); display: flex; align-items: center; gap: 12px; }
        .v3-dot { width: 10px; height: 10px; border-radius: 50%; background: #00615F; flex-shrink: 0; }
        .v3-info { flex: 1; }
        .v3-title { font-size: 13px; font-weight: 700; color: #1a1a1a; }
        .v3-price { font-size: 14px; font-weight: 800; color: #00615F; }
    </style>
</head>
<body>
    <div class="variant-tabs">
        <div class="variant-tab active" onclick="showVariant(1)">Image Top</div>
        <div class="variant-tab" onclick="showVariant(2)">Image Left</div>
        <div class="variant-tab" onclick="showVariant(3)">Minimal</div>
    </div>

    <div class="variant v1 active" id="v1">
        <div style="display:flex;gap:12px;">
            <div class="v1-card">
                <img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?auto=format&fit=crop&w=300&q=80" class="v1-img" alt="food">
                <div class="v1-body">
                    <div class="v1-title">Chocolate Cake</div>
                    <div class="v1-meta"><span>4.9</span><span>15 min</span></div>
                    <div class="v1-price">$8.50</div>
                </div>
            </div>
            <div class="v1-card">
                <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?auto=format&fit=crop&w=300&q=80" class="v1-img" alt="food">
                <div class="v1-body">
                    <div class="v1-title">Pepperoni Pizza</div>
                    <div class="v1-meta"><span>4.7</span><span>25 min</span></div>
                    <div class="v1-price">$14.00</div>
                </div>
            </div>
        </div>
    </div>

    <div class="variant" id="v2">
        <div style="display:flex;flex-direction:column;gap:10px;">
            <div class="v2-card">
                <img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?auto=format&fit=crop&w=300&q=80" class="v2-img" alt="food">
                <div class="v2-body">
                    <div class="v2-title">Chocolate Cake</div>
                    <div class="v2-price">$8.50</div>
                </div>
            </div>
            <div class="v2-card">
                <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?auto=format&fit=crop&w=300&q=80" class="v2-img" alt="food">
                <div class="v2-body">
                    <div class="v2-title">Pepperoni Pizza</div>
                    <div class="v2-price">$14.00</div>
                </div>
            </div>
        </div>
    </div>

    <div class="variant" id="v3">
        <div style="display:flex;flex-direction:column;gap:8px;">
            <div class="v3-card">
                <div class="v3-dot"></div>
                <div class="v3-info"><div class="v3-title">Chocolate Cake</div></div>
                <div class="v3-price">$8.50</div>
            </div>
            <div class="v3-card">
                <div class="v3-dot"></div>
                <div class="v3-info"><div class="v3-title">Pepperoni Pizza</div></div>
                <div class="v3-price">$14.00</div>
            </div>
        </div>
    </div>

    <script>
    function showVariant(n) {
        document.querySelectorAll('.variant').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.variant-tab').forEach(t => t.classList.remove('active'));
        document.getElementById('v' + n).classList.add('active');
        document.querySelectorAll('.variant-tab')[n - 1].classList.add('active');
    }
    </script>
</body>
</html>
