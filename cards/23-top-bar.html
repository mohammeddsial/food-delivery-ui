<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Bar – 3 Variants</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .tabs { display: flex; gap: 6px; margin-bottom: 16px; justify-content: center; max-width: 360px; width: 100%; }
        .tab { padding: 8px 14px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; border: 1.5px solid #ddd; background: #fff; color: #666; transition: all 0.2s; }
        .tab.active { background: #00615F; color: #fff; border-color: #00615F; }
        .variant { display: none; max-width: 360px; width: 100%; }
        .variant.active { display: block; }
        :root { --card-bg: #ffffff; --card-radius: 16px; --card-shadow: 0 2px 12px rgba(0,0,0,0.06); --accent: #00615F; --accent-light: #F0F7F6; --text-primary: #1a1a1a; --text-secondary: #888; --btn-radius: 12px; }
        .phone-mockup { width: 375px; background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.12); }
        .status-bar { height: 44px; background: #fff; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 24px 8px; position: relative; }
        .notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 120px; height: 28px; background: #000; border-radius: 0 0 20px 20px; }
        .time { font-size: 15px; font-weight: 700; color: #1a1a1a; }
        .icons { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #666; }
        .icons i { font-size: 13px; }
        .content { height: 200px; display: flex; align-items: center; justify-content: center; color: #ccc; font-size: 13px; }
        .icon-btn { width: 32px; height: 32px; border-radius: 10px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; border: none; }
        .icon-btn i { font-size: 15px; color: #333; }
        .icon-btn.filled i { color: #E91E63; }
        .badge { position: absolute; top: -4px; right: -4px; width: 16px; height: 16px; background: #1a1a1a; color: #fff; font-size: 8px; font-weight: 700; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #fff; }
        .cart-btn { width: 36px; height: 36px; border-radius: 12px; background: var(--accent); display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; border: none; flex-shrink: 0; }
        .cart-btn i { color: #fff; font-size: 18px; }
        .hamburger { width: 32px; height: 32px; border-radius: 10px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; flex-shrink: 0; }
        .hamburger i { font-size: 16px; color: #333; }
        .logo { width: 32px; height: 32px; border-radius: 9px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: #fff; letter-spacing: -0.3px; flex-shrink: 0; }
        .brand { font-size: 14px; font-weight: 800; color: var(--text-primary); }
        .notif-badge { position: absolute; top: -2px; right: -2px; width: 14px; height: 14px; background: #E91E63; color: #fff; font-size: 7px; font-weight: 700; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div style="display:flex;flex-direction:column;align-items:center;width:100%;">
        <div class="tabs">
            <div class="tab active" onclick="switchTab(0)">V1 Logo+3</div>
            <div class="tab" onclick="switchTab(1)">V2 Center+3</div>
            <div class="tab" onclick="switchTab(2)">V3 Name+3</div>
        </div>

        <!-- V1: Hamburger + FH logo + app name (left) → heart + notification(badge) + cart(badge) (right) -->
        <div class="variant active" id="v1">
            <div class="phone-mockup">
                <div class="status-bar">
                    <div class="notch"></div>
                    <span class="time">19:02</span>
                    <span class="icons"><i class="ri-signal-wifi-fill"></i><i class="ri-wifi-fill"></i><i class="ri-battery-2-fill"></i></span>
                </div>
                <div style="padding:8px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #eee;">
                    <div style="display:flex;align-items:center;gap:8px;">
                        <button class="hamburger"><i class="ri-menu-2-fill"></i></button>
                        <div class="logo">FH</div>
                        <span class="brand">Food Hub</span>
                    </div>
                    <div style="display:flex;align-items:center;gap:6px;">
                        <button class="icon-btn" onclick="this.classList.toggle('filled')"><i class="ri-heart-line"></i></button>
                        <button class="icon-btn" style="position:relative;"><i class="ri-notification-3-line"></i><span class="notif-badge">3</span></button>
                        <button class="cart-btn">
                            <i class="ri-shopping-bag-3-fill"></i>
                            <span class="badge">2</span>
                        </button>
                    </div>
                </div>
                <div class="content">Page Content</div>
            </div>
        </div>

        <!-- V2: Hamburger (left) → FH logo (center) → heart + notification(badge) + cart(badge) (right) -->
        <div class="variant" id="v2">
            <div class="phone-mockup">
                <div class="status-bar">
                    <div class="notch"></div>
                    <span class="time">19:02</span>
                    <span class="icons"><i class="ri-signal-wifi-fill"></i><i class="ri-wifi-fill"></i><i class="ri-battery-2-fill"></i></span>
                </div>
                <div style="padding:8px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #eee;position:relative;">
                    <button class="hamburger"><i class="ri-menu-2-fill"></i></button>
                    <div style="display:flex;align-items:center;gap:6px;position:absolute;left:50%;transform:translateX(-50%);">
                        <div class="logo">FH</div>
                    </div>
                    <div style="display:flex;align-items:center;gap:6px;">
                        <button class="icon-btn" onclick="this.classList.toggle('filled')"><i class="ri-heart-line"></i></button>
                        <button class="icon-btn" style="position:relative;"><i class="ri-notification-3-line"></i><span class="notif-badge">3</span></button>
                        <button class="cart-btn">
                            <i class="ri-shopping-bag-3-fill"></i>
                            <span class="badge">2</span>
                        </button>
                    </div>
                </div>
                <div class="content">Page Content</div>
            </div>
        </div>

        <!-- V3: Hamburger + app name (left) → heart + notification + cart(badge) (right) -->
        <div class="variant" id="v3">
            <div class="phone-mockup">
                <div class="status-bar">
                    <div class="notch"></div>
                    <span class="time">19:02</span>
                    <span class="icons"><i class="ri-signal-wifi-fill"></i><i class="ri-wifi-fill"></i><i class="ri-battery-2-fill"></i></span>
                </div>
                <div style="padding:8px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #eee;">
                    <div style="display:flex;align-items:center;gap:8px;">
                        <button class="hamburger"><i class="ri-menu-2-fill"></i></button>
                        <span class="brand">Food Hub</span>
                    </div>
                    <div style="display:flex;align-items:center;gap:8px;">
                        <button class="icon-btn" onclick="this.classList.toggle('filled')"><i class="ri-heart-line"></i></button>
                        <button class="icon-btn"><i class="ri-notification-3-line"></i></button>
                        <button class="cart-btn">
                            <i class="ri-shopping-bag-3-fill"></i>
                            <span class="badge">2</span>
                        </button>
                    </div>
                </div>
                <div class="content">Page Content</div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(idx) {
            document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===idx));
            document.querySelectorAll('.variant').forEach((v,i) => v.classList.toggle('active', i===idx));
        }
    </script>
</body>
</html>
