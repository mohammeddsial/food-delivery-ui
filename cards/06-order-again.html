<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Again Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .section { max-width: 360px; width: 100%; }
        .section-title { font-size: 16px; font-weight: 700; color: #1a1a1a; margin-bottom: 14px; }
        .rail { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 8px; }
        .rail::-webkit-scrollbar { display: none; }
        .card { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.06); flex-shrink: 0; width: 130px; }
        .card-img { width: 100%; height: 90px; object-fit: cover; display: block; }
        .card-body { padding: 10px; }
        .card-title { font-size: 11px; font-weight: 600; color: #1a1a1a; }
        .card-row { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
        .card-price { font-size: 12px; font-weight: 700; color: #FF6B35; }
        .card-add { width: 22px; height: 22px; border-radius: 50%; background: #FF6B35; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; font-weight: 700; cursor: pointer; border: none; }
    </style>
</head>
<body>
    <!-- MODULE: drawOrderAgain -->
    <!-- IMAGES: photo-1565299624946 (pizza), photo-1568901346375 (burger) -->
    <div class="section">
        <div class="section-title">Order Again</div>
        <div class="rail">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?auto=format&fit=crop&w=150&q=80" class="card-img" alt="food">
                <div class="card-body">
                    <div class="card-title">Pepperoni Pizza</div>
                    <div class="card-row">
                        <span class="card-price">$9.99</span>
                        <button class="card-add">+</button>
                    </div>
                </div>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=150&q=80" class="card-img" alt="food">
                <div class="card-body">
                    <div class="card-title">Beef Burger</div>
                    <div class="card-row">
                        <span class="card-price">$7.99</span>
                        <button class="card-add">+</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
