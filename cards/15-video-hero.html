<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Reel Hero</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .hero { max-width: 360px; width: 100%; height: 200px; border-radius: 18px; overflow: hidden; position: relative; background: linear-gradient(rgba(0,0,0,0) 40%, rgba(0,0,0,0.8) 100%), url('https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?auto=format&fit=crop&w=400&q=80'); background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: flex-end; padding: 18px; }
        .hero-play { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
        .play-btn { width: 28px; height: 28px; border-radius: 8px; background: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; }
        .play-btn i { color: #333; font-size: 14px; }
        .play-label { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.7); text-transform: uppercase; letter-spacing: 1px; }
        .hero-title { font-size: 20px; font-weight: 700; color: #fff; line-height: 1.1; }
    </style>
</head>
<body>
    <!-- MODULE: drawVideoHero -->
    <div class="hero">
        <div class="hero-play">
            <div class="play-btn"><i class="ri-play-fill"></i></div>
            <span class="play-label">Featured Video</span>
        </div>
        <div class="hero-title">Premium Heavy Interface Concept</div>
    </div>
</body>
</html>
