<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Tracker Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: #fff; border-radius: 20px; padding: 24px; max-width: 300px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-left: 4px solid #FF6B35; }
        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .card-label { font-size: 13px; font-weight: 700; color: #1a1a1a; display: flex; align-items: center; gap: 6px; }
        .card-label i { color: #FF6B35; }
        .card-time { font-size: 13px; font-weight: 600; color: #FF6B35; }
        .progress-bar { width: 100%; height: 6px; background: #f0f0f0; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: #FF6B35; border-radius: 3px; }
        .card-sub { font-size: 11px; color: #999; margin-top: 8px; }
    </style>
</head>
<body>
    <!-- MODULE: drawActiveOrderTracker -->
    <div class="card">
        <div class="card-header">
            <span class="card-label"><i class="ri-truck-line"></i> Delivery In Progress</span>
            <span class="card-time">12 min</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" style="width: 65%;"></div>
        </div>
        <div class="card-sub">Your order is being prepared</div>
    </div>
</body>
</html>
