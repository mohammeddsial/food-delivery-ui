<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Order Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .tabs { display: flex; gap: 6px; margin-bottom: 16px; justify-content: center; max-width: 360px; width: 100%; }
        .tab { padding: 8px 14px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; border: 1.5px solid #ddd; background: #fff; color: #666; transition: all 0.2s; }
        .tab.active { background: #00615F; color: #fff; border-color: #00615F; }
        .variant { display: none; max-width: 360px; width: 100%; }
        .variant.active { display: block; }

        .phone-frame { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.1); border: 3px solid #1a1a1a; }
        .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 6px 16px; background: #fff; }
        .status-bar .notch { width: 100px; height: 24px; background: #1a1a1a; border-radius: 0 0 16px 16px; }
        .status-bar .status-icons { display: flex; gap: 6px; align-items: center; font-size: 11px; font-weight: 600; color: #1a1a1a; }
        .status-bar .time { font-size: 11px; font-weight: 700; color: #1a1a1a; }
    </style>
</head>
<body>
    <div style="display:flex;flex-direction:column;align-items:center;width:100%;">
        <div class="tabs">
            <div class="tab active" onclick="switchTab(0)">Default</div>
            <div class="tab" onclick="switchTab(1)">Option 1</div>
            <div class="tab" onclick="switchTab(2)">Option 2</div>
        </div>

        <!-- V1: Default -->
        <div class="variant active" id="v1">
            <div class="phone-frame">
                <div class="status-bar">
                    <span class="time">19:02</span>
                    <div class="notch"></div>
                    <div class="status-icons">
                        <i class="ri-signal-wifi-fill"></i>
                        <i class="ri-battery-fill"></i>
                    </div>
                </div>
                <div style="padding:16px;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                        <div style="width:32px;height:32px;border-radius:50%;background:#F0F7F6;display:flex;align-items:center;justify-content:center;cursor:pointer;"><i class="ri-close-fill" style="font-size:16px;color:#1a1a1a;"></i></div>
                        <span style="font-size:14px;font-weight:700;color:#888;">#2145</span>
                    </div>
                    <div style="display:flex;justify-content:center;margin-bottom:20px;">
                        <img src="https://images.unsplash.com/photo-1551024506-0bccd828d307?auto=format&fit=crop&w=400&q=80" style="width:240px;height:200px;object-fit:cover;border-radius:24px;" alt="food">
                    </div>
                    <div style="text-align:center;margin-bottom:16px;">
                        <div style="font-size:22px;font-weight:700;color:#1a1a1a;">Whipping cream</div>
                        <div style="font-size:20px;font-weight:700;color:#1a1a1a;margin-top:4px;">$03.99</div>
                    </div>
                    <div style="display:flex;justify-content:space-between;margin-bottom:16px;padding:0 8px;">
                        <span style="font-size:13px;color:#888;">Items: <strong style="color:#1a1a1a;">5</strong></span>
                        <span style="font-size:13px;color:#888;">Delivery time: <strong style="color:#1a1a1a;">20 Min</strong></span>
                    </div>
                    <div style="display:flex;gap:12px;">
                        <button style="flex:1;padding:14px;background:#1A1A1A;color:#fff;border:none;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;">Track Order</button>
                        <button style="flex:1;padding:14px;background:#F9F3F0;color:#666;border:none;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;">Cancel</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- V2: Option 1 -->
        <div class="variant" id="v2">
            <div class="phone-frame">
                <div class="status-bar">
                    <span class="time">19:02</span>
                    <div class="notch"></div>
                    <div class="status-icons">
                        <i class="ri-signal-wifi-fill"></i>
                        <i class="ri-battery-fill"></i>
                    </div>
                </div>
                <div style="padding:16px;">
                    <div style="background:#fff;border-radius:14px;padding:12px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 12px rgba(0,0,0,0.06);">
                        <img src="https://images.unsplash.com/photo-1551024506-0bccd828d307?auto=format&fit=crop&w=80&q=80" style="width:48px;height:48px;border-radius:10px;object-fit:cover;" alt="food">
                        <div style="flex:1;">
                            <div style="font-size:12px;font-weight:700;color:#1a1a1a;">Order #2145 Active</div>
                            <div style="font-size:10px;color:#888;">5 items · 20 min delivery</div>
                        </div>
                        <button style="background:#00615F;color:#fff;font-size:10px;font-weight:700;padding:8px 14px;border-radius:10px;border:none;cursor:pointer;">Track</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- V3: Option 2 -->
        <div class="variant" id="v3">
            <div class="phone-frame">
                <div class="status-bar">
                    <span class="time">19:02</span>
                    <div class="notch"></div>
                    <div class="status-icons">
                        <i class="ri-signal-wifi-fill"></i>
                        <i class="ri-battery-fill"></i>
                    </div>
                </div>
                <div style="padding:16px;">
                    <div style="background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,0.06);">
                        <div style="font-size:14px;font-weight:700;color:#1a1a1a;margin-bottom:16px;">Order #2145</div>
                        <div style="display:flex;flex-direction:column;gap:0;">
                            <div style="display:flex;align-items:center;gap:12px;">
                                <div style="width:24px;height:24px;border-radius:50%;background:#00615F;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i class="ri-check-line" style="font-size:12px;color:#fff;"></i></div>
                                <div style="flex:1;border-left:2px solid #00615F;padding:0 0 12px 0;margin-left:-13px;padding-left:26px;">
                                    <div style="font-size:11px;font-weight:700;color:#1a1a1a;">Order Confirmed</div>
                                    <div style="font-size:9px;color:#888;">2 min ago</div>
                                </div>
                            </div>
                            <div style="display:flex;align-items:center;gap:12px;">
                                <div style="width:24px;height:24px;border-radius:50%;background:#00615F;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i class="ri-check-line" style="font-size:12px;color:#fff;"></i></div>
                                <div style="flex:1;border-left:2px solid #00615F;padding:0 0 12px 0;margin-left:-13px;padding-left:26px;">
                                    <div style="font-size:11px;font-weight:700;color:#1a1a1a;">Being Prepared</div>
                                    <div style="font-size:9px;color:#888;">Chef is cooking</div>
                                </div>
                            </div>
                            <div style="display:flex;align-items:center;gap:12px;">
                                <div style="width:24px;height:24px;border-radius:50%;background:#F0F7F6;border:2px solid #00615F;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                                    <div style="width:8px;height:8px;border-radius:50%;background:#00615F;"></div>
                                </div>
                                <div style="flex:1;padding:0 0 0 0;margin-left:-13px;padding-left:26px;">
                                    <div style="font-size:11px;font-weight:700;color:#1a1a1a;">Out for Delivery</div>
                                    <div style="font-size:9px;color:#888;">Arriving in ~20 min</div>
                                </div>
                            </div>
                            <div style="display:flex;align-items:center;gap:12px;">
                                <div style="width:24px;height:24px;border-radius:50%;background:#f5f5f5;border:2px solid #ddd;display:flex;align-items:center;justify-content:center;flex-shrink:0;"></div>
                                <div style="flex:1;margin-left:-13px;padding-left:26px;">
                                    <div style="font-size:11px;font-weight:600;color:#888;">Delivered</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(idx) {
            document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===idx));
            document.querySelectorAll('.variant').forEach((v,i) => v.classList.toggle('active', i===idx));
        }
    </script>
</body>
</html>
