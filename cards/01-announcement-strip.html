<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Announcement Strip – 3 Variants</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .tabs { display: flex; gap: 6px; margin-bottom: 16px; justify-content: center; max-width: 360px; width: 100%; }
        .tab {
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            border: 1.5px solid #ddd;
            background: #fff;
            color: #666;
            transition: all 0.2s;
        }
        .tab.active {
            background: #00615F;
            color: #fff;
            border-color: #00615F;
        }
        .variant { display: none; max-width: 360px; width: 100%; }
        .variant.active { display: block; }

        /* ----- CSS Variables (matching main viewport) ----- */
        :root {
            --card-bg: #ffffff;
            --card-radius: 16px;
            --card-shadow: 0 2px 12px rgba(0,0,0,0.06);
            --accent: #00615F;
            --accent-light: #F0F7F6;
            --text-primary: #1a1a1a;
            --text-secondary: #888;
            --btn-radius: 12px;
        }

        /* Shared card wrapper */
        .strip-card {
            background: var(--card-bg);
            border-radius: var(--card-radius);
            box-shadow: var(--card-shadow);
            overflow: hidden;
        }
        .btn-morph {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .btn-morph:hover { transform: scale(1.05); }
        .btn-morph:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div style="display:flex;flex-direction:column;align-items:center;width:100%;">
        <div class="tabs">
            <div class="tab active" onclick="switchTab(0)">Default (Variant 1)</div>
            <div class="tab" onclick="switchTab(1)">Variant 2</div>
            <div class="tab" onclick="switchTab(2)">Variant 3</div>
        </div>

        <!-- V1: Left Border + Dot + Headline + Description + Tag (3.png) -->
        <div class="variant active" id="v1">
            <div class="strip-card" style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-left:4px solid var(--accent);">
                <div style="width:36px;height:36px;border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--accent);font-size:18px;">
                    <i class="ri-truck-fill"></i>
                </div>
                <div style="flex:1;">
                    <div style="font-size:14px;font-weight:700;color:var(--text-primary);">FREE DELIVERY</div>
                    <div style="font-size:11px;color:var(--text-secondary);">On orders over $25</div>
                </div>
                <span style="background:var(--accent);color:#fff;border-radius:var(--btn-radius);padding:4px 12px;font-size:10px;font-weight:700;white-space:nowrap;">Limited Time</span>
            </div>
        </div>

        <!-- V2: No icon, text left, due date + tag on right (9.png) -->
        <div class="variant" id="v2">
            <div class="strip-card" style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;">
                <div>
                    <div style="font-size:14px;font-weight:700;color:var(--text-primary);">FREE DELIVERY</div>
                    <div style="font-size:11px;color:var(--text-secondary);">On orders over $25</div>
                </div>
                <div style="display:flex;align-items:center;gap:12px;">
                    <span style="font-size:10px;color:var(--text-secondary);">Ends 04/22</span>
                    <span style="background:var(--accent);color:#fff;border-radius:var(--btn-radius);padding:4px 12px;font-size:10px;font-weight:700;">Claim Offer</span>
                </div>
            </div>
        </div>

        <!-- V3: Right Border + Icon + Headline + Description (11.png) -->
        <div class="variant" id="v3">
            <div class="strip-card" style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-right:4px solid var(--accent);">
                <div style="flex:1;">
                    <div style="font-size:14px;font-weight:700;color:var(--text-primary);">FREE DELIVERY</div>
                    <div style="font-size:11px;color:var(--text-secondary);">On orders over $25</div>
                </div>
                <div style="width:36px;height:36px;border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--accent);font-size:18px;">
                    <i class="ri-truck-fill"></i>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(idx) {
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
            document.querySelectorAll('.variant').forEach((v, i) => v.classList.toggle('active', i === idx));
        }
    </script>
</body>
</html>
