<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Header</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .tabs { display: flex; gap: 6px; margin-bottom: 16px; justify-content: center; max-width: 360px; width: 100%; }
        .tab { padding: 8px 14px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; border: 1.5px solid #ddd; background: #fff; color: #666; transition: all 0.2s; }
        .tab.active { background: #00615F; color: #fff; border-color: #00615F; }
        .variant { display: none; max-width: 360px; width: 100%; }
        .variant.active { display: block; }

        .phone-frame { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.1); border: 3px solid #1a1a1a; }
        .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 6px 16px; background: #fff; }
        .status-bar .notch { width: 100px; height: 24px; background: #1a1a1a; border-radius: 0 0 16px 16px; }
        .status-bar .status-icons { display: flex; gap: 6px; align-items: center; font-size: 11px; font-weight: 600; color: #1a1a1a; }
        .status-bar .time { font-size: 11px; font-weight: 700; color: #1a1a1a; }

        .toggle { display: flex; background: #f0f0f0; border-radius: 9999px; padding: 3px; }
        .toggle-btn { flex: 1; padding: 8px 12px; border-radius: 9999px; font-size: 11px; font-weight: 700; border: none; cursor: pointer; background: transparent; color: #888; transition: all 0.2s; }
        .toggle-btn.active { background: #1a1a1a; color: #fff; }
    </style>
</head>
<body>
    <div style="display:flex;flex-direction:column;align-items:center;width:100%;">
        <div class="tabs">
            <div class="tab active" onclick="switchTab(0)">Default</div>
            <div class="tab" onclick="switchTab(1)">Option 1</div>
            <div class="tab" onclick="switchTab(2)">Option 2</div>
        </div>

        <!-- V1: Default -->
        <div class="variant active" id="v1">
            <div class="phone-frame">
                <div class="status-bar">
                    <span class="time">19:02</span>
                    <div class="notch"></div>
                    <div class="status-icons">
                        <i class="ri-signal-wifi-fill"></i>
                        <i class="ri-battery-fill"></i>
                    </div>
                </div>
                <div style="padding:14px 16px;display:flex;flex-direction:column;gap:10px;">
                    <div style="display:flex;justify-content:space-between;align-items:center;">
                        <div style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                            <div style="width:32px;height:32px;border-radius:10px;background:#F0F7F6;display:flex;align-items:center;justify-content:center;"><i class="ri-menu-3-fill" style="font-size:16px;color:#1a1a1a;"></i></div>
                            <div>
                                <div style="font-size:9px;color:#888;letter-spacing:1px;text-transform:uppercase;font-weight:600;">Deliver to</div>
                                <div style="font-size:12px;font-weight:700;color:#1a1a1a;display:flex;align-items:center;gap:4px;">Manhattan West, NY <i class="ri-arrow-down-s-fill" style="font-size:12px;color:#1a1a1a;"></i></div>
                            </div>
                        </div>
                        <div style="width:32px;height:32px;border-radius:50%;overflow:hidden;border:1px solid #f0f0f0;">
                            <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=80&q=80" style="width:100%;height:100%;object-fit:cover;" alt="avatar">
                        </div>
                    </div>
                    <div style="display:flex;background:#F0F7F6;border-radius:10px;padding:8px 12px;align-items:center;gap:8px;">
                        <i class="ri-search-line" style="color:#999;font-size:16px;"></i>
                        <span style="font-size:12px;color:#888;">Search restaurants, dishes...</span>
                    </div>
                    <div class="toggle">
                        <button class="toggle-btn active">Delivery</button>
                        <button class="toggle-btn">Pickup</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- V2: Option 1 -->
        <div class="variant" id="v2">
            <div class="phone-frame">
                <div class="status-bar">
                    <span class="time">19:02</span>
                    <div class="notch"></div>
                    <div class="status-icons">
                        <i class="ri-signal-wifi-fill"></i>
                        <i class="ri-battery-fill"></i>
                    </div>
                </div>
                <div style="padding:14px 16px;display:flex;flex-direction:column;gap:10px;">
                    <div style="display:flex;justify-content:space-between;align-items:center;">
                        <div style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                            <div style="width:32px;height:32px;border-radius:10px;background:#F0F7F6;display:flex;align-items:center;justify-content:center;"><i class="ri-menu-3-fill" style="font-size:16px;color:#1a1a1a;"></i></div>
                            <div>
                                <div style="font-size:9px;color:#888;letter-spacing:1px;text-transform:uppercase;font-weight:600;">Deliver to</div>
                                <div style="font-size:12px;font-weight:700;color:#1a1a1a;display:flex;align-items:center;gap:4px;">Manhattan West, NY <i class="ri-arrow-down-s-fill" style="font-size:12px;color:#1a1a1a;"></i></div>
                            </div>
                        </div>
                        <div style="width:32px;height:32px;border-radius:50%;overflow:hidden;border:1px solid #f0f0f0;">
                            <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=80&q=80" style="width:100%;height:100%;object-fit:cover;" alt="avatar">
                        </div>
                    </div>
                    <div style="display:flex;background:#F0F7F6;border-radius:10px;padding:8px 12px;align-items:center;gap:8px;">
                        <i class="ri-search-line" style="color:#999;font-size:16px;"></i>
                        <span style="font-size:12px;color:#888;">Search restaurants, dishes...</span>
                    </div>
                    <div class="toggle">
                        <button class="toggle-btn active">Delivery</button>
                        <button class="toggle-btn">Pickup</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- V3: Option 2 -->
        <div class="variant" id="v3">
            <div class="phone-frame">
                <div class="status-bar">
                    <span class="time">19:02</span>
                    <div class="notch"></div>
                    <div class="status-icons">
                        <i class="ri-signal-wifi-fill"></i>
                        <i class="ri-battery-fill"></i>
                    </div>
                </div>
                <div style="padding:12px 16px;display:flex;align-items:center;justify-content:space-between;">
                    <div style="display:flex;align-items:center;gap:10px;">
                        <div style="width:36px;height:36px;border-radius:50%;overflow:hidden;border:2px solid #00615F;">
                            <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=80&q=80" style="width:100%;height:100%;object-fit:cover;" alt="avatar">
                        </div>
                        <div style="cursor:pointer;">
                            <div style="font-size:13px;font-weight:700;color:#1a1a1a;display:flex;align-items:center;gap:4px;">Manhattan West, NY <i class="ri-arrow-down-s-fill" style="font-size:12px;color:#1a1a1a;"></i></div>
                            <div style="font-size:9px;color:#888;">Deliver now</div>
                        </div>
                    </div>
                    <div style="display:flex;gap:6px;">
                        <div style="width:34px;height:34px;border-radius:10px;background:#F0F7F6;display:flex;align-items:center;justify-content:center;"><i class="ri-notification-3-line" style="font-size:18px;color:#1a1a1a;"></i></div>
                        <div style="width:34px;height:34px;border-radius:10px;background:#F0F7F6;display:flex;align-items:center;justify-content:center;"><i class="ri-shopping-cart-2-line" style="font-size:18px;color:#1a1a1a;"></i></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(idx) {
            document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===idx));
            document.querySelectorAll('.variant').forEach((v,i) => v.classList.toggle('active', i===idx));
        }
    </script>
</body>
</html>
