<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Reward Banner</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .tabs { display: flex; gap: 6px; margin-bottom: 16px; justify-content: center; max-width: 360px; width: 100%; }
        .tab { padding: 8px 14px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; border: 1.5px solid #ddd; background: #fff; color: #666; transition: all 0.2s; }
        .tab.active { background: #00615F; color: #fff; border-color: #00615F; }
        .variant { display: none; max-width: 360px; width: 100%; }
        .variant.active { display: block; }
        :root { --card-bg: #ffffff; --card-radius: 16px; --card-shadow: 0 2px 12px rgba(0,0,0,0.06); --accent: #00615F; --accent-light: #F0F7F6; --text-primary: #1a1a1a; --text-secondary: #888; --btn-radius: 12px; }
    </style>
</head>
<body>
    <div style="display:flex;flex-direction:column;align-items:center;width:100%;">
        <div class="tabs">
            <div class="tab active" onclick="switchTab(0)">Default</div>
            <div class="tab" onclick="switchTab(1)">Option 1</div>
            <div class="tab" onclick="switchTab(2)">Option 2</div>
        </div>

        <!-- V1: Center-aligned strip with cake icon + text + gift icon -->
        <div class="variant active" id="v1">
            <div style="width:375px;height:812px;background:#f5f5f5;border-radius:40px;overflow:hidden;border:10px solid #1a1a1a;position:relative;">
                <div style="height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;font-size:12px;font-weight:600;">
                    <span>19:02</span>
                    <div style="width:80px;height:28px;background:#000;border-radius:20px;position:absolute;left:50%;transform:translateX(-50%);top:4px;"></div>
                    <div style="display:flex;gap:6px;align-items:center;">
                        <i class="ri-signal-wifi-fill" style="font-size:14px;"></i>
                        <i class="ri-battery-fill" style="font-size:14px;"></i>
                    </div>
                </div>
                <div style="padding:16px;">
                    <div style="padding:14px;background:var(--card-bg);border-radius:16px;box-shadow:var(--card-shadow);text-align:center;display:flex;align-items:center;justify-content:center;gap:8px;">
                        <i class="ri-cake-2-fill" style="font-size:18px;color:var(--text-primary);"></i>
                        <div style="font-size:11px;font-weight:700;color:var(--text-primary);">Happy Birthday! Your free treat is ready</div>
                        <i class="ri-gift-fill" style="font-size:18px;color:#FFC200;"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- V2: Full-width gradient banner -->
        <div class="variant" id="v2">
            <div style="width:375px;height:812px;background:#f5f5f5;border-radius:40px;overflow:hidden;border:10px solid #1a1a1a;position:relative;">
                <div style="height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;font-size:12px;font-weight:600;">
                    <span>19:02</span>
                    <div style="width:80px;height:28px;background:#000;border-radius:20px;position:absolute;left:50%;transform:translateX(-50%);top:4px;"></div>
                    <div style="display:flex;gap:6px;align-items:center;">
                        <i class="ri-signal-wifi-fill" style="font-size:14px;"></i>
                        <i class="ri-battery-fill" style="font-size:14px;"></i>
                    </div>
                </div>
                <div style="padding:0 16px 16px;">
                    <div style="background:linear-gradient(135deg,var(--accent),var(--accent-light));border-radius:16px;padding:16px;color:#fff;display:flex;align-items:center;justify-content:space-between;">
                        <div>
                            <div style="font-size:16px;font-weight:800;">Happy Birthday!</div>
                            <div style="font-size:10px;opacity:0.9;margin-top:2px;">Your free treat is ready</div>
                        </div>
                        <div style="font-size:32px;">&#127874;</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- V3: Minimal text strip with bottom accent border -->
        <div class="variant" id="v3">
            <div style="width:375px;height:812px;background:#f5f5f5;border-radius:40px;overflow:hidden;border:10px solid #1a1a1a;position:relative;">
                <div style="height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;font-size:12px;font-weight:600;">
                    <span>19:02</span>
                    <div style="width:80px;height:28px;background:#000;border-radius:20px;position:absolute;left:50%;transform:translateX(-50%);top:4px;"></div>
                    <div style="display:flex;gap:6px;align-items:center;">
                        <i class="ri-signal-wifi-fill" style="font-size:14px;"></i>
                        <i class="ri-battery-fill" style="font-size:14px;"></i>
                    </div>
                </div>
                <div style="padding:0 16px 16px;">
                    <div style="padding:10px 16px;border-bottom:2px solid var(--accent);display:flex;align-items:center;justify-content:center;gap:8px;">
                        <span style="font-size:11px;font-weight:700;color:var(--text-primary);">Happy Birthday! Your free treat is ready</span>
                        <span style="font-size:14px;">&#127873;</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(idx) {
            document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===idx));
            document.querySelectorAll('.variant').forEach((v,i) => v.classList.toggle('active', i===idx));
        }
    </script>
</body>
</html>
