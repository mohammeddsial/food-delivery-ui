<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Featured Items</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f5f5; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; background: #fff; padding: 6px; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .tab { padding: 10px 18px; border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer; border: none; background: transparent; color: #999; transition: all 0.2s; }
        .tab.active { background: #00615F; color: #fff; }
        .tab:hover:not(.active) { background: #f5f5f5; }
        .variant { display: none; }
        .variant.active { display: block; }

        /* V1: Image Top */
        .v1-card { max-width: 360px; width: 100%; background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .v1-img-wrap { position: relative; }
        .v1-img { width: 100%; height: 160px; object-fit: cover; display: block; }
        .v1-badge-free { position: absolute; top: 12px; left: 12px; background: #00615F; color: #fff; font-size: 10px; font-weight: 700; padding: 5px 12px; border-radius: 10px; z-index: 2; }
        .v1-badge-bookmark { position: absolute; top: 12px; right: 12px; border-radius: 20px; padding: 6px 14px; width: auto; background: rgba(255,255,255,0.92); display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.12); z-index: 2; cursor: pointer; }
        .v1-badge-bookmark i { color: #00615F; font-size: 16px; }
        .v1-body { padding: 16px; }
        .v1-name { font-size: 18px; font-weight: 700; color: #1a1a1a; }
        .v1-meta { display: flex; align-items: center; gap: 12px; margin-top: 6px; }
        .v1-meta span { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #888; font-weight: 600; }
        .v1-meta i { font-size: 14px; }
        .v1-meta .star { color: #FFD700; }
        .v1-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
        .v1-tag { font-size: 10px; font-weight: 600; padding: 5px 12px; border-radius: 10px; background: #f5f5f5; color: #666; }

        /* V2: Image Left */
        .v2-card { max-width: 360px; width: 100%; background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08); display: flex; flex-direction: row; }
        .v2-img-wrap { position: relative; }
        .v2-img { width: 110px; height: 120px; object-fit: cover; display: block; flex-shrink: 0; }
        .v2-badge-free { position: absolute; bottom: 8px; left: 8px; background: #00615F; color: #fff; font-size: 9px; font-weight: 700; padding: 4px 10px; border-radius: 8px; }
        .v2-body { padding: 14px; flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .v2-name { font-size: 15px; font-weight: 700; color: #1a1a1a; }
        .v2-meta { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
        .v2-meta span { display: flex; align-items: center; gap: 3px; font-size: 11px; color: #888; font-weight: 600; }
        .v2-meta i { font-size: 12px; }
        .v2-tags { display: flex; gap: 4px; margin-top: 8px; }
        .v2-tag { font-size: 9px; font-weight: 600; padding: 4px 8px; border-radius: 6px; background: #f5f5f5; color: #666; }
        .v2-bookmark { border-radius: 20px; padding: 6px 14px; width: auto; background: #FFF3ED; display: flex; align-items: center; justify-content: center; flex-shrink: 0; align-self: start; cursor: pointer; }
        .v2-bookmark i { color: #00615F; font-size: 14px; }

        /* V3: Minimal */
        .v3-card { max-width: 360px; width: 100%; background: #fff; border-radius: 16px; padding: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); display: flex; align-items: center; gap: 14px; }
        .v3-avatar { width: 50px; height: 50px; border-radius: 14px; background: #FFF3ED; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .v3-avatar i { color: #00615F; font-size: 22px; }
        .v3-body { flex: 1; }
        .v3-name { font-size: 14px; font-weight: 700; color: #1a1a1a; }
        .v3-meta { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
        .v3-meta span { display: flex; align-items: center; gap: 3px; font-size: 11px; color: #888; font-weight: 600; }
        .v3-meta i { font-size: 12px; }
        .v3-tags { display: flex; gap: 4px; margin-top: 6px; }
        .v3-tag { font-size: 9px; font-weight: 600; padding: 3px 8px; border-radius: 6px; background: #f5f5f5; color: #666; }
        .v3-actions { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
        .v3-btn { padding: 8px 14px; border-radius: 10px; background: #00615F; color: #fff; font-size: 11px; font-weight: 700; border: none; cursor: pointer; }
        .v3-bookmark { border-radius: 20px; padding: 6px 14px; width: auto; background: #f5f5f5; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; }
        .v3-bookmark i { color: #00615F; font-size: 14px; }
    </style>
</head>
<body>
    <div class="tabs">
        <button class="tab active" onclick="switchTab('v1')">Image Top</button>
        <button class="tab" onclick="switchTab('v2')">Image Left</button>
        <button class="tab" onclick="switchTab('v3')">Minimal</button>
    </div>

    <!-- V1: Image Top -->
    <div class="variant active" id="v1">
        <div class="v1-card">
            <div class="v1-img-wrap">
                <img src="https://images.unsplash.com/photo-1555507036-ab1f4038808a?auto=format&fit=crop&w=400&q=80" class="v1-img" alt="food">
                <div class="v1-badge-free">Free Delivery</div>
                <div class="v1-badge-bookmark"><i class="ri-bookmark-fill"></i></div>
            </div>
            <div class="v1-body">
                <div class="v1-name">Burger King</div>
                <div class="v1-meta">
                    <span><i class="ri-star-fill star"></i> 4.9</span>
                    <span><i class="ri-time-line"></i> 20-25 Min</span>
                </div>
                <div class="v1-tags">
                    <span class="v1-tag">Burger</span>
                    <span class="v1-tag">Pizza</span>
                    <span class="v1-tag">Fast Food</span>
                </div>
            </div>
        </div>
    </div>

    <!-- V2: Image Left -->
    <div class="variant" id="v2">
        <div class="v2-card">
            <div class="v2-img-wrap">
                <img src="https://images.unsplash.com/photo-1555507036-ab1f4038808a?auto=format&fit=crop&w=200&q=80" class="v2-img" alt="food">
                <div class="v2-badge-free">Free Delivery</div>
            </div>
            <div class="v2-body">
                <div class="v2-name">Burger King</div>
                <div class="v2-meta">
                    <span><i class="ri-star-fill star"></i> 4.9</span>
                    <span><i class="ri-time-line"></i> 20-25 Min</span>
                </div>
                <div class="v2-tags">
                    <span class="v2-tag">Burger</span>
                    <span class="v2-tag">Pizza</span>
                </div>
            </div>
            <div class="v2-bookmark"><i class="ri-bookmark-fill"></i></div>
        </div>
    </div>

    <!-- V3: Minimal -->
    <div class="variant" id="v3">
        <div class="v3-card">
            <div class="v3-avatar"><i class="ri-restaurant-fill"></i></div>
            <div class="v3-body">
                <div class="v3-name">Burger King</div>
                <div class="v3-meta">
                    <span><i class="ri-star-fill"></i> 4.9</span>
                    <span><i class="ri-time-line"></i> 20-25 Min</span>
                </div>
                <div class="v3-tags">
                    <span class="v3-tag">Burger</span>
                    <span class="v3-tag">Pizza</span>
                    <span class="v3-tag">Fast Food</span>
                </div>
            </div>
            <div class="v3-actions">
                <button class="v3-btn">Order</button>
                <button class="v3-bookmark"><i class="ri-bookmark-fill"></i></button>
            </div>
        </div>
    </div>

    <script>
        function switchTab(id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.variant').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
