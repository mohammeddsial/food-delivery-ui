<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Featured Items</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .tabs { display: flex; gap: 6px; margin-bottom: 16px; justify-content: center; max-width: 360px; width: 100%; }
        .tab { padding: 8px 14px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; border: 1.5px solid #ddd; background: #fff; color: #666; transition: all 0.2s; }
        .tab.active { background: #00615F; color: #fff; border-color: #00615F; }
        .variant { display: none; max-width: 360px; width: 100%; }
        .variant.active { display: block; }
        :root { --card-bg: #ffffff; --card-radius: 16px; --card-shadow: 0 2px 12px rgba(0,0,0,0.06); --accent: #00615F; --accent-light: #F0F7F6; --text-primary: #1a1a1a; --text-secondary: #888; --btn-radius: 12px; }
    </style>
</head>
<body>
    <div style="display:flex;flex-direction:column;align-items:center;width:100%;">
        <div class="tabs">
            <div class="tab active" onclick="switchTab(0)">Default</div>
            <div class="tab" onclick="switchTab(1)">Option 1</div>
            <div class="tab" onclick="switchTab(2)">Option 2</div>
        </div>

        <!-- V1: Large hero card with image + badge + name + rating + tags -->
        <div class="variant active" id="v1">
            <div style="width:375px;height:812px;background:#f5f5f5;border-radius:40px;overflow:hidden;border:10px solid #1a1a1a;position:relative;">
                <div style="height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;font-size:12px;font-weight:600;">
                    <span>19:02</span>
                    <div style="width:80px;height:28px;background:#000;border-radius:20px;position:absolute;left:50%;transform:translateX(-50%);top:4px;"></div>
                    <div style="display:flex;gap:6px;align-items:center;">
                        <i class="ri-signal-wifi-fill" style="font-size:14px;"></i>
                        <i class="ri-battery-fill" style="font-size:14px;"></i>
                    </div>
                </div>
                <div style="padding:0 16px 16px;">
                    <div style="background:var(--card-bg);border-radius:24px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.08);">
                        <div style="position:relative;">
                            <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=600&q=80" style="width:100%;height:180px;object-fit:cover;" alt="Burger King">
                            <div style="position:absolute;top:12px;left:12px;background:#1A1A1A;color:#fff;padding:6px 14px;border-radius:12px;font-size:12px;font-weight:700;">Free Delivery</div>
                            <div style="position:absolute;top:12px;right:12px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.95);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.1);">
                                <i class="ri-bookmark-fill" style="font-size:14px;color:#1A1A1A;"></i>
                            </div>
                        </div>
                        <div style="padding:16px;">
                            <div style="font-size:20px;font-weight:700;color:#1a1a1a;">Burger King</div>
                            <div style="display:flex;align-items:center;gap:10px;margin-top:8px;">
                                <span style="display:flex;align-items:center;gap:4px;font-size:13px;font-weight:600;color:#FFC200;">
                                    <i class="ri-star-fill" style="font-size:14px;color:#FFC200;"></i> 4.9
                                </span>
                                <span style="display:flex;align-items:center;gap:4px;font-size:13px;color:var(--text-secondary);">
                                    <i class="ri-time-line" style="font-size:14px;color:var(--text-secondary);"></i> 20-25 Min
                                </span>
                            </div>
                            <div style="display:flex;gap:8px;margin-top:12px;">
                                <span style="font-size:12px;font-weight:600;color:#666;background:#F9F3F0;padding:6px 14px;border-radius:10px;">Burger</span>
                                <span style="font-size:12px;font-weight:600;color:#666;background:#F9F3F0;padding:6px 14px;border-radius:10px;">Pizza</span>
                                <span style="font-size:12px;font-weight:600;color:#666;background:#F9F3F0;padding:6px 14px;border-radius:10px;">Fast Food</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- V2: Compact horizontal card -->
        <div class="variant" id="v2">
            <div style="width:375px;height:812px;background:#f5f5f5;border-radius:40px;overflow:hidden;border:10px solid #1a1a1a;position:relative;">
                <div style="height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;font-size:12px;font-weight:600;">
                    <span>19:02</span>
                    <div style="width:80px;height:28px;background:#000;border-radius:20px;position:absolute;left:50%;transform:translateX(-50%);top:4px;"></div>
                    <div style="display:flex;gap:6px;align-items:center;">
                        <i class="ri-signal-wifi-fill" style="font-size:14px;"></i>
                        <i class="ri-battery-fill" style="font-size:14px;"></i>
                    </div>
                </div>
                <div style="padding:0 16px 16px;">
                    <div style="background:var(--card-bg);border-radius:14px;padding:12px;display:flex;gap:12px;box-shadow:var(--card-shadow);">
                        <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=600&q=80" style="width:80px;height:80px;border-radius:12px;object-fit:cover;flex-shrink:0;" alt="Burger King">
                        <div style="flex:1;display:flex;flex-direction:column;justify-content:center;">
                            <div style="font-size:14px;font-weight:700;color:var(--text-primary);">Burger King</div>
                            <div style="display:flex;align-items:center;gap:6px;margin-top:4px;">
                                <span style="display:flex;align-items:center;gap:2px;font-size:11px;font-weight:600;color:var(--accent);">
                                    <i class="ri-star-fill" style="font-size:12px;color:#FFC200;"></i> 4.9
                                </span>
                                <span style="font-size:10px;color:var(--text-secondary);">20-25 Min</span>
                            </div>
                            <div style="display:flex;gap:4px;margin-top:6px;">
                                <span style="font-size:9px;font-weight:600;color:var(--text-secondary);background:var(--pill-bg);padding:3px 8px;border-radius:6px;">Burger</span>
                                <span style="font-size:9px;font-weight:600;color:var(--text-secondary);background:var(--pill-bg);padding:3px 8px;border-radius:6px;">Pizza</span>
                            </div>
                        </div>
                        <div style="display:flex;flex-direction:column;justify-content:space-between;align-items:flex-end;">
                            <div style="background:var(--accent);color:#fff;padding:3px 8px;border-radius:6px;font-size:8px;font-weight:700;">Free Delivery</div>
                            <div style="width:28px;height:28px;border-radius:50%;background:var(--pill-bg);display:flex;align-items:center;justify-content:center;">
                                <i class="ri-bookmark-fill" style="font-size:14px;color:#1A1A1A;"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- V3: Full-width image with text overlay at bottom -->
        <div class="variant" id="v3">
            <div style="width:375px;height:812px;background:#f5f5f5;border-radius:40px;overflow:hidden;border:10px solid #1a1a1a;position:relative;">
                <div style="height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;font-size:12px;font-weight:600;">
                    <span>19:02</span>
                    <div style="width:80px;height:28px;background:#000;border-radius:20px;position:absolute;left:50%;transform:translateX(-50%);top:4px;"></div>
                    <div style="display:flex;gap:6px;align-items:center;">
                        <i class="ri-signal-wifi-fill" style="font-size:14px;"></i>
                        <i class="ri-battery-fill" style="font-size:14px;"></i>
                    </div>
                </div>
                <div style="padding:0 16px 16px;">
                    <div style="border-radius:16px;overflow:hidden;position:relative;height:160px;">
                        <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=600&q=80" style="width:100%;height:100%;object-fit:cover;" alt="Burger King">
                        <div style="position:absolute;inset:0;background:linear-gradient(transparent 40%,rgba(0,0,0,0.8) 100%);"></div>
                        <div style="position:absolute;bottom:0;left:0;right:0;padding:14px;color:#fff;">
                            <div style="display:flex;justify-content:space-between;align-items:flex-end;">
                                <div>
                                    <div style="font-size:16px;font-weight:700;">Burger King</div>
                                    <div style="display:flex;align-items:center;gap:6px;margin-top:4px;">
                                        <span style="font-size:11px;font-weight:600;color:#FFC200;">&#9733; 4.9</span>
                                        <span style="font-size:10px;opacity:0.8;">20-25 Min</span>
                                    </div>
                                </div>
                                <div style="background:var(--accent);padding:4px 10px;border-radius:8px;font-size:9px;font-weight:700;">Free Delivery</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(idx) {
            document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===idx));
            document.querySelectorAll('.variant').forEach((v,i) => v.classList.toggle('active', i===idx));
        }
    </script>
</body>
</html>
