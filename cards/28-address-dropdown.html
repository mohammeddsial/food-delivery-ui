<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Address Dropdown</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .phone { width: 375px; background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.12); }
        .status-bar { height: 44px; background: #fff; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 24px 8px; position: relative; }
        .notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 120px; height: 28px; background: #000; border-radius: 0 0 20px 20px; }
        .time { font-size: 15px; font-weight: 700; color: #1a1a1a; }
        .s-icons { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #666; }
        .s-icons i { font-size: 13px; }
        .nav-row { padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; background: #fff; }
        .nav-left { display: flex; align-items: center; gap: 10px; }
        .hamburger { width: 32px; height: 32px; border-radius: 10px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; }
        .hamburger i { font-size: 16px; color: #333; }
        .brand { font-size: 14px; font-weight: 800; color: #1a1a1a; }
        .cart-btn { width: 36px; height: 36px; border-radius: 12px; background: #FF6B35; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; border: none; }
        .cart-btn i { color: #fff; font-size: 18px; }
        .cart-badge { position: absolute; top: -4px; right: -4px; width: 16px; height: 16px; background: #1a1a1a; color: #fff; font-size: 9px; font-weight: 700; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #fff; }

        .header { padding: 16px; position: relative; }
        .address-row { display: flex; align-items: center; justify-content: space-between; cursor: pointer; padding: 10px 14px; border-radius: 14px; background: #f9f9f9; transition: background 0.2s; }
        .address-row:hover { background: #f0f0f0; }
        .address-left { display: flex; align-items: center; gap: 10px; }
        .address-icon { width: 36px; height: 36px; border-radius: 10px; background: #FFF3ED; display: flex; align-items: center; justify-content: center; }
        .address-icon i { color: #FF6B35; font-size: 18px; }
        .address-label { font-size: 10px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }
        .address-text { font-size: 13px; font-weight: 700; color: #1a1a1a; margin-top: 1px; }
        .address-chevron { color: #999; font-size: 16px; transition: transform 0.2s; }
        .address-chevron.open { transform: rotate(180deg); }

        /* Dropdown */
        .dropdown { position: absolute; top: 70px; left: 16px; right: 16px; background: #fff; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); border: 1px solid #eee; z-index: 10; display: none; overflow: hidden; }
        .dropdown.show { display: block; }
        .dropdown-header { padding: 14px 16px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
        .dropdown-title { font-size: 14px; font-weight: 700; color: #1a1a1a; }
        .dropdown-add { font-size: 12px; font-weight: 600; color: #FF6B35; cursor: pointer; border: none; background: none; }
        .dropdown-list { max-height: 240px; overflow-y: auto; }
        .dropdown-item { padding: 14px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: background 0.2s; border-bottom: 1px solid #f5f5f5; }
        .dropdown-item:hover { background: #f9f9f9; }
        .dropdown-item.selected { background: #FFF3ED; }
        .item-radio { width: 18px; height: 18px; border-radius: 50%; border: 2px solid #ddd; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .item-radio.selected { border-color: #FF6B35; }
        .item-radio.selected::after { content: ''; width: 8px; height: 8px; border-radius: 50%; background: #FF6B35; }
        .item-icon { width: 32px; height: 32px; border-radius: 8px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .item-icon i { font-size: 14px; color: #FF6B35; }
        .item-label { font-size: 13px; font-weight: 600; color: #1a1a1a; }
        .item-sub { font-size: 11px; color: #999; margin-top: 1px; }
        .dropdown-footer { padding: 12px 16px; border-top: 1px solid #eee; }
        .add-btn { width: 100%; padding: 10px; border-radius: 12px; border: 2px dashed #ddd; background: none; color: #999; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .add-btn:hover { border-color: #FF6B35; color: #FF6B35; }

        .content { height: 350px; display: flex; align-items: center; justify-content: center; color: #ccc; font-size: 13px; }
    </style>
</head>
<body>
    <!-- MODULE: Address Dropdown -->
    <div class="phone">
        <div class="status-bar">
            <div class="notch"></div>
            <span class="time">19:02</span>
            <span class="s-icons"><i class="ri-signal-wifi-fill"></i><i class="ri-wifi-fill"></i><i class="ri-battery-2-fill"></i></span>
        </div>
        <div class="nav-row">
            <div class="nav-left">
                <button class="hamburger"><i class="ri-menu-2-fill"></i></button>
                <span class="brand">Food Hub</span>
            </div>
            <button class="cart-btn"><i class="ri-shopping-bag-3-fill"></i><span class="cart-badge">2</span></button>
        </div>

        <div class="header">
            <div class="address-row" id="addressRow">
                <div class="address-left">
                    <div class="address-icon"><i class="ri-map-pin-2-fill"></i></div>
                    <div>
                        <div class="address-label">Deliver to</div>
                        <div class="address-text" id="currentAddress">2715 Ash Dr. San Jose, SD</div>
                    </div>
                </div>
                <i class="ri-arrow-down-s-fill address-chevron" id="chevron"></i>
            </div>

            <div class="dropdown" id="dropdown">
                <div class="dropdown-header">
                    <span class="dropdown-title">Select Address</span>
                    <button class="dropdown-add">+ Add New</button>
                </div>
                <div class="dropdown-list">
                    <div class="dropdown-item selected" data-addr="2715 Ash Dr. San Jose, SD">
                        <div class="item-radio selected"></div>
                        <div class="item-icon"><i class="ri-home-4-fill"></i></div>
                        <div>
                            <div class="item-label">Home</div>
                            <div class="item-sub">2715 Ash Dr. San Jose, SD</div>
                        </div>
                    </div>
                    <div class="dropdown-item" data-addr="123 Market St. San Francisco, CA">
                        <div class="item-radio"></div>
                        <div class="item-icon"><i class="ri-briefcase-fill"></i></div>
                        <div>
                            <div class="item-label">Work</div>
                            <div class="item-sub">123 Market St. San Francisco, CA</div>
                        </div>
                    </div>
                    <div class="dropdown-item" data-addr="456 Oak Ave. Brooklyn, NY">
                        <div class="item-radio"></div>
                        <div class="item-icon"><i class="ri-building-2-fill"></i></div>
                        <div>
                            <div class="item-label">Apartment</div>
                            <div class="item-sub">456 Oak Ave. Brooklyn, NY</div>
                        </div>
                    </div>
                    <div class="dropdown-item" data-addr="789 Pine Rd. Austin, TX">
                        <div class="item-radio"></div>
                        <div class="item-icon"><i class="ri-map-pin-fill"></i></div>
                        <div>
                            <div class="item-label">Other</div>
                            <div class="item-sub">789 Pine Rd. Austin, TX</div>
                        </div>
                    </div>
                </div>
                <div class="dropdown-footer">
                    <button class="add-btn"><i class="ri-add-line"></i> Add new address</button>
                </div>
            </div>
        </div>

        <div class="content">Page Content</div>
    </div>

    <script>
        const addressRow = document.getElementById('addressRow');
        const dropdown = document.getElementById('dropdown');
        const chevron = document.getElementById('chevron');
        const currentAddress = document.getElementById('currentAddress');

        addressRow.addEventListener('click', () => {
            dropdown.classList.toggle('show');
            chevron.classList.toggle('open');
        });

        document.querySelectorAll('.dropdown-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.dropdown-item').forEach(i => {
                    i.classList.remove('selected');
                    i.querySelector('.item-radio').classList.remove('selected');
                });
                item.classList.add('selected');
                item.querySelector('.item-radio').classList.add('selected');
                currentAddress.textContent = item.dataset.addr;
                dropdown.classList.remove('show');
                chevron.classList.remove('open');
            });
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.header')) {
                dropdown.classList.remove('show');
                chevron.classList.remove('open');
            }
        });
    </script>
</body>
</html>
