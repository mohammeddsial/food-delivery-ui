<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stories</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .stories { max-width: 360px; width: 100%; display: flex; gap: 14px; overflow-x: auto; padding-bottom: 8px; }
        .stories::-webkit-scrollbar { display: none; }
        .story { width: 60px; height: 60px; border-radius: 50%; border: 3px solid #1a1a1a; overflow: hidden; flex-shrink: 0; cursor: pointer; }
        .story img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .story-add { width: 60px; height: 60px; border-radius: 50%; border: 3px dashed #ccc; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: #f9f9f9; cursor: pointer; }
        .story-add span { font-size: 20px; color: #ccc; }
    </style>
</head>
<body>
    <!-- MODULE: drawStories -->
    <!-- IMAGE: photo-1534528741775 (avatar) -->
    <div class="stories">
        <div class="story">
            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=80&q=80" alt="story">
        </div>
        <div class="story-add">
            <span>+</span>
        </div>
    </div>
</body>
</html>
